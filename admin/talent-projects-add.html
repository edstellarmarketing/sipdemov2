<style>
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.page-body{max-width:1400px;margin:0 auto;padding:28px 32px 60px;width:100%}
.page-head{margin-bottom:20px}
.page-head h1{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text-primary);margin:0 0 4px}
.page-head p{font-size:13px;color:var(--text-secondary);margin:0}

/* Layout */
.create-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px 24px}
@media(max-width:800px){.create-panel>div:first-child{grid-template-columns:1fr!important}}

/* Suggestion card */
.sug-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;transition:all .15s;cursor:default}
.sug-card:hover{box-shadow:0 3px 12px rgba(0,0,0,0.06);border-color:var(--text-muted)}
.sug-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.sug-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sug-title{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--text-primary);flex:1}
.sug-priority{font-size:9px;padding:3px 8px;border-radius:100px;font-weight:600;white-space:nowrap}
.sug-priority.critical{background:var(--red-bg);color:var(--red)}
.sug-priority.high{background:var(--amber-bg);color:var(--amber)}
.sug-priority.medium{background:rgba(59,130,246,0.08);color:#3B82F6}
.sug-reason{font-size:11.5px;color:var(--text-secondary);line-height:1.5;margin-bottom:10px}
.sug-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.sug-tag{font-size:9.5px;padding:2px 8px;border-radius:100px;border:1px solid var(--border);color:var(--text-muted)}
.sug-tag.skill{background:rgba(59,130,246,0.05);border-color:rgba(59,130,246,0.15);color:#3B82F6}
.sug-tag.dept{background:rgba(201,168,76,0.05);border-color:rgba(201,168,76,0.2);color:var(--accent)}
.sug-source{font-size:10px;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:4px}
.sug-actions{display:flex;gap:8px}

/* Create form panel */
.form-group{margin-bottom:12px}
.form-label{font-size:10.5px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;display:block}
.form-input,.form-select,.form-textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-family:var(--font-body);font-size:12px;color:var(--text-primary);background:var(--card);box-sizing:border-box}

.form-hint{font-size:11px;color:var(--text-muted);margin-top:2px}

.btn-primary:hover{background:#B8983F}
.btn-sm{padding:6px 12px;font-size:11px}

.section-label{font-size:12px;font-weight:700;color:var(--text-primary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;margin-top:18px;display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(0,0,0,0.02);border-left:3px solid var(--accent);border-radius:0 6px 6px 0}

.section-label.audience::after{background:rgba(201,168,76,0.25)}
.audience-level{margin-top:8px;padding-left:0;transition:all .2s}
.audience-level .form-label{display:flex;align-items:center;gap:6px}
.audience-level .form-label::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--accent);opacity:.4}

.no-data{padding:40px;text-align:center;color:var(--text-muted);font-size:13px;background:var(--card);border:1px solid var(--border);border-radius:10px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:#fff;padding:10px 22px;border-radius:10px;font-size:12.5px;font-family:var(--font-body);z-index:9999;transition:transform .3s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Toggle switch */
.toggle-wrap{display:inline-flex;align-items:center;gap:8px;cursor:pointer}
.toggle-track{width:36px;height:20px;border-radius:10px;background:rgba(0,0,0,0.12);position:relative;transition:background .2s}
.toggle-track.on{background:var(--accent)}

.toggle-track.on .toggle-knob{left:18px}
.toggle-label{font-size:12px;color:var(--text-primary)}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}

// ═══════════════════════════════════════════════════════
// LOAD ORG CONTEXT
// ═══════════════════════════════════════════════════════
function loadOrgData(){
  var raw=null;
  try{raw=sessionStorage.getItem('sip_orgsetup_v4')}catch(e){}
  if(!raw){try{raw=localStorage.getItem('sip_orgsetup_v4')}catch(e){}}
  if(!raw)return null;
  try{return JSON.parse(raw)}catch(e){return null}
}
function getBlock(state,id){
  if(!state||!state.blocks||!state.blocks[id])return{};
  return state.blocks[id].data||{};
}

// ═══════════════════════════════════════════════════════
// GENERATE AI SUGGESTIONS FROM ORG CONTEXT
// ═══════════════════════════════════════════════════════
function generateSuggestions(){
  var org=loadOrgData();
  if(!org) return[];
  var suggestions=[];

  // 1. Market Skill Demand gaps (Block E)
  var eData=getBlock(org,'E');
  (eData.marketSkillDemand||[]).forEach(function(msd){
    if(msd.Demand_Level==='Critical Shortage'||msd.Demand_Level==='High Demand'){
      suggestions.push({
        title:msd.Skill_Name+' — Capability Building Programme',
        reason:'Market demand is <strong>'+msd.Demand_Level+'</strong> in '+msd.Primary_Market+' with a scarcity score of '+msd.Scarcity_Score+'/10. Your internal supply is only <strong>'+msd.Internal_Supply+' employees</strong> vs market salary of $'+Number(msd.Market_Salary).toLocaleString()+'. '+msd.Strategic_Response,
        priority:msd.Demand_Level==='Critical Shortage'?'critical':'high',
        icon:'',iconBg:'var(--red-bg)',
        skills:[msd.Skill_Name],depts:[],type:'Training Programs',
        source:'Block E — Market Skill Demand ('+msd.Source+')',
        category:'Employee Development'
      });
    }
  });

  // 2. Sunsetting & Planned Adoption tools (Block G)
  var gData=getBlock(org,'G');
  (gData.tools||[]).forEach(function(tool){
    if(tool.lifecycle==='Sunsetting (within 12m)'){
      suggestions.push({
        title:tool.name+' Migration — Reskilling Programme',
        reason:'<strong>'+tool.name+'</strong> is sunsetting within 12 months. '+((tool.departmentScope||[]).join(', ')||'Multiple')+' department'+(tool.departmentScope&&tool.departmentScope.length>1?'s':'')+' need migration training. Delayed reskilling risks project delivery and client commitments.',
        priority:'critical',icon:'',iconBg:'var(--amber-bg)',
        skills:[tool.name+' Migration','Change Management'],depts:tool.departmentScope||[],type:'Training Programs',
        source:'Block G — Tools & Technologies (Sunsetting)',
        category:'Employee Development'
      });
    }
    if(tool.lifecycle==='Planned Adoption'){
      suggestions.push({
        title:tool.name+' Adoption — Upskilling Initiative',
        reason:'<strong>'+tool.name+'</strong> ('+tool.vendor+') is planned for adoption in '+((tool.departmentScope||[]).join(', ')||'Digital Delivery')+'. Proactive upskilling ensures smooth rollout and reduces adoption friction.',
        priority:'high',icon:'',iconBg:'rgba(59,130,246,0.08)',
        skills:[tool.name],depts:tool.departmentScope||[],type:'Talent Development Programs',
        source:'Block G — Tools & Technologies (Planned Adoption)',
        category:'Employee Development'
      });
    }
  });

  // 3. BCDR Exercise Skill Gaps (Block M)
  var mData=getBlock(org,'M');
  (mData.exercises||[]).forEach(function(ex){
    if(ex.skillGaps&&ex.skillGaps.length&&(ex.outcome||'').indexOf('Partial')>=0){
      suggestions.push({
        title:'BCDR Gap Remediation — '+ex.name,
        reason:'DR exercise "<strong>'+ex.name+'</strong>" ('+ex.dateConducted+') identified <strong>'+ex.skillGaps.length+' skill gaps</strong>: '+ex.skillGaps.join(', ')+'. Outcome was "'+ex.outcome+'". Lessons: '+ex.lessons,
        priority:'high',icon:'',iconBg:'var(--amber-bg)',
        skills:ex.skillGaps,depts:[],type:'Training Programs',
        source:'Block M — DR Testing & Exercises',
        category:'Employee Development'
      });
    }
  });

  // 4. Strategic Risks requiring skill mitigation (Block C)
  var cData=getBlock(org,'C');
  (cData.strategicRisks||[]).forEach(function(risk){
    if(risk.severity==='High'||risk.likelihood==='Likely'){
      suggestions.push({
        title:'Risk Mitigation — '+risk.name,
        reason:'Strategic risk "<strong>'+risk.name+'</strong>" rated <strong>'+risk.severity+' severity / '+risk.likelihood+'</strong>. Owner: '+risk.owner+'. Mitigation: '+risk.mitigationPlan,
        priority:risk.severity==='High'?'high':'medium',
        icon:'',iconBg:'var(--red-bg)',
        skills:[],depts:[],type:'Talent Development Programs',
        source:'Block C — Strategic Risks',
        category:'Employee Development'
      });
    }
  });

  // 5. Regulatory Skill Demand (Block E)
  (eData.regulatorySkillDemand||[]).forEach(function(rsd){
    if(rsd.Employees_Required>rsd.Employees_Compliant){
      var gap=rsd.Employees_Required-rsd.Employees_Compliant;
      suggestions.push({
        title:rsd.Skill_Name+' Compliance — '+rsd.Geography,
        reason:'<strong>'+rsd.Regulation_Name+'</strong> requires '+rsd.Employees_Required+' compliant employees. Currently <strong>'+rsd.Employees_Compliant+' compliant</strong> ('+gap+' gap). Deadline: '+rsd.Compliance_Deadline+'. Penalty risk: $'+rsd.Penalty_M+'M. '+rsd.Notes,
        priority:'critical',icon:'',iconBg:'var(--red-bg)',
        skills:[rsd.Skill_Name],depts:[],type:'eLearning Assignment',
        source:'Block E — Regulatory Skill Demand',
        category:'Employee Development'
      });
    }
  });

  // 6. Client projects from strategic clients (Block E)
  (eData.clients||[]).filter(function(c){return c.isStrategic}).forEach(function(client){
    suggestions.push({
      title:'Capability Alignment — '+client.name+' Account',
      reason:'<strong>'+client.name+'</strong> ('+client.industry+', '+client.geography+') is a strategic account with NPS '+client.npsScore+'. Proactive capability building aligned to client industry ensures contract renewal and upsell readiness.',
      priority:'medium',icon:'',iconBg:'rgba(201,168,76,0.08)',
      skills:[],depts:[],type:'Assessments',
      source:'Block E — Strategic Client Portfolio',
      category:'Client Servicing'
    });
  });

  var pOrder={critical:0,high:1,medium:2};
  suggestions.sort(function(a,b){return(pOrder[a.priority]||9)-(pOrder[b.priority]||9)});
  return suggestions;
}

// ═══════════════════════════════════════════════════════
// MULTI-SELECT COMPONENT
// ═══════════════════════════════════════════════════════
function renderMultiSelect(id,options,selected,placeholder){
  var sel=selected||[];
  var h='<div style="position:relative">';
  h+='<div class="form-input" style="min-height:34px;cursor:pointer;display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding:5px 8px" onclick="toggleDropdown(\''+id+'\')" id="'+id+'_display">';
  if(sel.length){sel.forEach(function(s){h+='<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 8px;border-radius:100px;background:rgba(59,130,246,0.06);color:#3B82F6;border:1px solid rgba(59,130,246,0.15)">'+esc(s)+' <span style="cursor:pointer;font-size:12px;color:#3B82F6" onclick="event.stopPropagation();removeMultiItem(\''+id+'\',\''+esc(s).replace(/'/g,"\\'")+'\')">×</span></span>'})}
  else{h+='<span style="color:var(--text-muted);font-size:12px">'+esc(placeholder||'Select...')+'</span>'}
  h+='</div>';
  h+='<div id="'+id+'_dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;max-height:200px;overflow-y:auto;background:var(--card);border:1px solid var(--border);border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,0.1);z-index:20;margin-top:2px">';
  h+='<div style="padding:6px 8px;border-bottom:1px solid var(--border)"><input class="form-input" style="padding:5px 8px;font-size:11px" placeholder="Search..." oninput="filterMultiDropdown(\''+id+'\',this.value)"></div>';
  h+='<div id="'+id+'_options">';
  options.forEach(function(o){
    var checked=sel.indexOf(o)>=0;
    h+='<label style="display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:11.5px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,0.03)" data-val="'+esc(o)+'" onmouseover="this.style.background=\'rgba(0,0,0,0.02)\'" onmouseout="this.style.background=\'\'">';
    h+='<input type="checkbox" '+(checked?'checked':'')+' onchange="toggleMultiItem(\''+id+'\',\''+esc(o).replace(/'/g,"\\'")+'\',this.checked)" style="margin:0">';
    h+='<span>'+esc(o)+'</span></label>';
  });
  h+='</div></div></div>';
  return h;
}

var _multiSelections={};
function getMultiSelected(id){return _multiSelections[id]||[]}
function setMultiSelected(id,arr){_multiSelections[id]=arr}

function toggleDropdown(id){
  var dd=document.getElementById(id+'_dropdown');
  dd.style.display=dd.style.display==='none'?'block':'none';
}
function filterMultiDropdown(id,q){
  var opts=document.getElementById(id+'_options');
  if(!opts)return;
  var labels=opts.querySelectorAll('label');
  labels.forEach(function(l){var v=l.getAttribute('data-val')||'';l.style.display=v.toLowerCase().indexOf(q.toLowerCase())>=0?'':'none'});
}
function toggleMultiItem(id,val,checked){
  var sel=getMultiSelected(id).slice();
  if(checked&&sel.indexOf(val)<0)sel.push(val);
  if(!checked)sel=sel.filter(function(s){return s!==val});
  setMultiSelected(id,sel);
  refreshMultiDisplay(id);
  audienceCascade(id);
}
function removeMultiItem(id,val){
  var sel=getMultiSelected(id).filter(function(s){return s!==val});
  setMultiSelected(id,sel);
  var opts=document.getElementById(id+'_options');
  if(opts){opts.querySelectorAll('input[type=checkbox]').forEach(function(cb){var lbl=cb.parentElement;if((lbl.getAttribute('data-val')||'')===val)cb.checked=false})}
  refreshMultiDisplay(id);
  audienceCascade(id);
}
function refreshMultiDisplay(id){
  var sel=getMultiSelected(id);
  var disp=document.getElementById(id+'_display');
  if(!disp)return;
  var h='';
  if(sel.length){sel.forEach(function(s){h+='<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 8px;border-radius:100px;background:rgba(59,130,246,0.06);color:#3B82F6;border:1px solid rgba(59,130,246,0.15)">'+esc(s)+' <span style="cursor:pointer;font-size:12px;color:#3B82F6" onclick="event.stopPropagation();removeMultiItem(\''+id+'\',\''+s.replace(/'/g,"\\'")+'\')">×</span></span>'})}
  else{h='<span style="color:var(--text-muted);font-size:12px">Select...</span>'}
  disp.innerHTML=h;
}

// CASCADING AUDIENCE SELECTOR
// BU → Departments → Levels → Roles → Employees
// ═══════════════════════════════════════════════════════
var _audiencePrefixes={};

function deptsForBUs(buNames){
  var depts=[];
  BUSINESS_UNITS.forEach(function(bu){
    if(buNames.indexOf(bu.name)>=0) bu.depts.forEach(function(d){if(depts.indexOf(d)<0)depts.push(d)});
  });
  return depts.length?depts:ALL_DEPTS.slice();
}

function rolesForDepts(depts){
  var roles=[];
  depts.forEach(function(d){(DEPT_ROLES[d]||[]).forEach(function(r){if(roles.indexOf(r)<0)roles.push(r)})});
  return roles;
}

function empsForFilters(depts,levels,roles){
  var all=[];
  try{
    var raw=sessionStorage.getItem('sip_dataport_import')||localStorage.getItem('sip_dataport_import');
    if(raw){
      var data=JSON.parse(raw);
      (data.employees||[]).forEach(function(e){
        if(depts.length&&depts.indexOf(e.department)<0) return;
        if(levels.length){
          var empLvlLabel=(e.jobLevel||'')+' \u2014 ';
          var matched=false;
          levels.forEach(function(l){if(l.indexOf(e.jobLevel)===0) matched=true});
          if(!matched) return;
        }
        if(roles.length&&roles.indexOf(e.role)<0) return;
        all.push(e.id+' \u2014 '+e.fullName+' \u2014 '+e.role+' ('+e.department+')');
      });
    }
  }catch(ex){}
  if(!all.length) all=getEmployeeNames();
  return all;
}

function renderAudienceSection(prefix,extras){
  _audiencePrefixes[prefix]=true;
  _multiSelections[prefix+'_bu']=[];
  _multiSelections[prefix+'_dept']=[];
  _multiSelections[prefix+'_level']=[];
  _multiSelections[prefix+'_role']=[];
  _multiSelections[prefix+'_emp']=[];

  var h='<div class="section-label audience" style="margin-top:16px">Audience</div>';

  if(extras&&extras.before) h+=extras.before;

  h+='<div class="audience-level"><div class="form-group"><label class="form-label">Business Units</label>'+renderMultiSelect(prefix+'_bu',BU_NAMES,[],'Select business units...')+'</div></div>';

  h+='<div id="'+prefix+'_dept_wrap" style="display:none" class="audience-level">';
  h+='<div class="form-group"><label class="form-label">Departments</label>';
  h+='<div id="'+prefix+'_dept_container">'+renderMultiSelect(prefix+'_dept',ALL_DEPTS,[],'Select departments...')+'</div>';
  h+='</div></div>';

  h+='<div id="'+prefix+'_level_wrap" style="display:none" class="audience-level">';
  h+='<div class="form-group"><label class="form-label">Levels</label>';
  h+='<div id="'+prefix+'_level_container">'+renderMultiSelect(prefix+'_level',JOB_LEVELS,[],'Select levels...')+'</div>';
  h+='</div></div>';

  h+='<div id="'+prefix+'_role_wrap" style="display:none" class="audience-level">';
  h+='<div class="form-group"><label class="form-label">Roles</label>';
  h+='<div id="'+prefix+'_role_container">'+renderMultiSelect(prefix+'_role',[],[],'Select roles...')+'</div>';
  h+='</div></div>';

  h+='<div id="'+prefix+'_emp_wrap" style="display:none" class="audience-level">';
  h+='<div class="form-group"><label class="form-label">Employees</label>';
  h+='<div id="'+prefix+'_emp_container">'+renderMultiSelect(prefix+'_emp',getEmployeeNames(),[],'Select employees...')+'</div>';
  h+='</div></div>';

  if(extras&&extras.after) h+=extras.after;

  return h;
}

function audienceCascade(changedId){
  for(var prefix in _audiencePrefixes){
    // BU changed → show Departments + Employees
    if(changedId===prefix+'_bu'){
      var bus=getMultiSelected(prefix+'_bu');
      var deptWrap=document.getElementById(prefix+'_dept_wrap');
      var levelWrap=document.getElementById(prefix+'_level_wrap');
      var roleWrap=document.getElementById(prefix+'_role_wrap');
      var empWrap=document.getElementById(prefix+'_emp_wrap');
      if(bus.length){
        var filteredDepts=deptsForBUs(bus);
        if(deptWrap)deptWrap.style.display='';
        _multiSelections[prefix+'_dept']=[];
        var dc=document.getElementById(prefix+'_dept_container');
        if(dc) dc.innerHTML=renderMultiSelect(prefix+'_dept',filteredDepts,[],'Select departments...');
        // Show employees directly (BU → Employees path)
        if(empWrap)empWrap.style.display='';
        _multiSelections[prefix+'_emp']=[];
        var ec=document.getElementById(prefix+'_emp_container');
        if(ec) ec.innerHTML=renderMultiSelect(prefix+'_emp',empsForFilters(filteredDepts,[],[]),[],'Select employees...');
        // Reset levels and roles
        if(levelWrap)levelWrap.style.display='none';
        if(roleWrap)roleWrap.style.display='none';
        _multiSelections[prefix+'_level']=[];_multiSelections[prefix+'_role']=[];
      } else {
        if(deptWrap)deptWrap.style.display='none';
        if(levelWrap)levelWrap.style.display='none';
        if(roleWrap)roleWrap.style.display='none';
        if(empWrap)empWrap.style.display='none';
        _multiSelections[prefix+'_dept']=[];_multiSelections[prefix+'_level']=[];_multiSelections[prefix+'_role']=[];_multiSelections[prefix+'_emp']=[];
      }
      return;
    }
    // Dept changed → show Levels + Roles filtered by dept + update Employees
    if(changedId===prefix+'_dept'){
      var depts=getMultiSelected(prefix+'_dept');
      var levelWrap=document.getElementById(prefix+'_level_wrap');
      var roleWrap=document.getElementById(prefix+'_role_wrap');
      var empWrap=document.getElementById(prefix+'_emp_wrap');
      if(depts.length){
        if(levelWrap)levelWrap.style.display='';
        // Show roles filtered to selected departments
        var filteredRoles=rolesForDepts(depts);
        if(roleWrap)roleWrap.style.display='';
        _multiSelections[prefix+'_role']=[];
        var rc=document.getElementById(prefix+'_role_container');
        if(rc) rc.innerHTML=renderMultiSelect(prefix+'_role',filteredRoles,[],'Select roles...');
        // Update employees
        _multiSelections[prefix+'_emp']=[];
        var ec=document.getElementById(prefix+'_emp_container');
        if(ec) ec.innerHTML=renderMultiSelect(prefix+'_emp',empsForFilters(depts,[],[]),[],'Select employees...');
        if(empWrap)empWrap.style.display='';
      } else {
        if(levelWrap)levelWrap.style.display='none';
        if(roleWrap)roleWrap.style.display='none';
        _multiSelections[prefix+'_level']=[];_multiSelections[prefix+'_role']=[];
        var bus=getMultiSelected(prefix+'_bu');
        var buDepts=deptsForBUs(bus);
        _multiSelections[prefix+'_emp']=[];
        var ec=document.getElementById(prefix+'_emp_container');
        if(ec) ec.innerHTML=renderMultiSelect(prefix+'_emp',empsForFilters(buDepts,[],[]),[],'Select employees...');
      }
      return;
    }
    // Level changed → filter Employees by dept + level
    if(changedId===prefix+'_level'){
      var depts=getMultiSelected(prefix+'_dept');
      var levels=getMultiSelected(prefix+'_level');
      var roles=getMultiSelected(prefix+'_role');
      _multiSelections[prefix+'_emp']=[];
      var ec=document.getElementById(prefix+'_emp_container');
      if(ec) ec.innerHTML=renderMultiSelect(prefix+'_emp',empsForFilters(depts,levels,roles),[],'Select employees...');
      return;
    }
    // Role changed → filter Employees by dept + level + role
    if(changedId===prefix+'_role'){
      var depts=getMultiSelected(prefix+'_dept');
      var levels=getMultiSelected(prefix+'_level');
      var roles=getMultiSelected(prefix+'_role');
      _multiSelections[prefix+'_emp']=[];
      var ec=document.getElementById(prefix+'_emp_container');
      if(ec) ec.innerHTML=renderMultiSelect(prefix+'_emp',empsForFilters(depts,levels,roles),[],'Select employees...');
      return;
    }
  }
}

window._toggleStates={};
function renderToggle(id,label,defaultOn){
  window._toggleStates[id]=!!defaultOn;
  return '<div class="toggle-wrap" onclick="toggleSwitch(\''+id+'\')">'
    +'<div class="toggle-track'+(defaultOn?' on':'')+'" id="'+id+'_track"><div class="toggle-knob"></div></div>'
    +'<span class="toggle-label">'+esc(label)+'</span></div>';
}
function toggleSwitch(id){
  window._toggleStates[id]=!window._toggleStates[id];
  var track=document.getElementById(id+'_track');
  if(track){if(window._toggleStates[id])track.classList.add('on');else track.classList.remove('on')}
}
function getToggleState(id){return !!(window._toggleStates&&window._toggleStates[id])}

function renderRadio(name,options,defaultVal){
  return options.map(function(o){
    return '<label style="display:inline-flex;align-items:center;gap:4px;margin-right:14px;font-size:12px;cursor:pointer">'
      +'<input type="radio" name="'+name+'" value="'+esc(o)+'"'+(o===defaultVal?' checked':'')+'>'
      +esc(o)+'</label>';
  }).join('');
}
function getRadioValue(name){var el=document.querySelector('input[name="'+name+'"]:checked');return el?el.value:''}

function selOpts(arr,selected){return arr.map(function(v){return'<option value="'+esc(v)+'"'+(v===selected?' selected':'')+'>'+esc(v)+'</option>'}).join('')}

  },50);

}

function renderTypeFields(type){
  var el=document.getElementById('typeSpecificFields');
  if(!el)return;
  var renderer=TYPE_FORM_RENDERERS[type];
  el.innerHTML=renderer?renderer():'<div class="form-hint">Select a project type to see configuration options.</div>';
}

function onTypeChange(){
  var sel=document.getElementById('fpType');
  window._selectedType=sel.value;
  window._currentProjectId=generateProjectId(sel.value);
  renderTypeFields(sel.value);
  var btn=document.getElementById('saveBtnLabel');
  if(btn) btn.textContent=TYPE_CTA[sel.value]||'Save Project';
  var idEl=document.getElementById('fpProjectId');
  if(idEl) idEl.textContent=window._currentProjectId;
}

function val(id){var e=document.getElementById(id);return e?e.value.trim():''}
function intVal(id){return parseInt(val(id))||0}
function floatVal(id){return parseFloat(val(id))||0}
function checked(id){var e=document.getElementById(id);return e?e.checked:false}

function collectAudience(prefix){
  return {businessUnits:getMultiSelected(prefix+'_bu'),departments:getMultiSelected(prefix+'_dept'),levels:getMultiSelected(prefix+'_level'),roles:getMultiSelected(prefix+'_role'),employees:getMultiSelected(prefix+'_emp')};
}

function collectTypeConfig(){
  var type=window._selectedType||'Assessments';
  var config={projectType:type};

  if(type==='Assessments'){
    config.assessmentType=val('asmt_type');config.timeLimit=intVal('asmt_timeLimit');config.totalQuestions=intVal('asmt_totalQ');
    config.includeQualitative=getToggleState('asmt_qualitative');
    config.audience=collectAudience('asmt');
    config.launchDate=val('asmt_launch');config.completionDeadline=val('asmt_deadline');
  }
  else if(type==='Skills Matrix'){
    config.skills=getMultiSelected('sm_skills');config.proficiencyScale=val('sm_scale');config.allowSelfAssessment=getToggleState('sm_selfAssess');
    config.audience=collectAudience('sm');
    config.initialDate=val('sm_initDate');config.updateFrequency=val('sm_frequency');
  }
  else if(type==='Surveys'){
    config.surveyType=val('srv_type');config.totalQuestions=intVal('srv_totalQ');
    config.anonymous=getToggleState('srv_anonymous');config.allowComments=getToggleState('srv_comments');config.showProgress=getToggleState('srv_progress');

    config.launchDate=val('srv_launch');config.closeDate=val('srv_close');config.sendReminders=checked('srv_reminders');

  else if(type==='Training Programs'){
    config.category=val('trn_category');config.deliveryMode=val('trn_delivery');config.totalDuration=intVal('trn_duration');config.modules=intVal('trn_modules');

    config.resourceLinks=val('trn_resources');config.trainerNames=val('trn_trainers');

    config.startDate=val('trn_start');config.endDate=val('trn_end');
  }
  else if(type==='Coaching'){
    config.focusArea=val('coach_focus');config.coachingType=val('coach_type');config.totalSessions=intVal('coach_sessions');
    config.sessionDuration=intVal('coach_duration');config.sessionFrequency=val('coach_frequency');config.trackNotes=getToggleState('coach_notes');
    config.coach=val('coach_coach');config.coachType=getRadioValue('coach_coachType');config.format=getRadioValue('coach_format');
    config.audience=collectAudience('coach');config.goals=val('coach_goals');config.metrics=getMultiSelected('coach_metrics');
    config.requireProgress=getToggleState('coach_progress');config.startDate=val('coach_start');config.endDate=val('coach_end');
  }
  else if(type==='Mentoring'){
    config.theme=val('mnt_theme');config.mentoringType=val('mnt_type');config.durationMonths=intVal('mnt_durationMonths');
    config.meetingFrequency=val('mnt_frequency');config.reverseMentoring=getToggleState('mnt_reverse');config.peerCircles=getToggleState('mnt_peer');
    config.mentors=getMultiSelected('mnt_mentors');config.matchingMethod=val('mnt_matching');
    config.audience=collectAudience('mnt');
    config.objectives=val('mnt_objectives');config.milestones=intVal('mnt_milestones');config.trackProgress=getToggleState('mnt_trackProgress');
    config.startDate=val('mnt_start');config.endDate=val('mnt_end');
  }
  else if(type==='eLearning Assignment'){
    config.contentCategory=val('el_category');config.course=val('el_course');config.externalUrl=val('el_extUrl');
    config.estimatedDuration=intVal('el_duration');config.completionCriteria=val('el_completion');config.passingScore=intVal('el_passingScore');
    config.multipleAttempts=getToggleState('el_multiAttempt');config.prerequisites=getMultiSelected('el_prereqs');
    config.audience=collectAudience('el');config.assignmentType=getRadioValue('el_assignType');
    config.assignDate=val('el_assignDate');config.deadline=val('el_deadline');config.sendReminders=getToggleState('el_reminders');
  }
  else if(type==='Webinars'){
    config.category=val('web_category');config.tags=getMultiSelected('web_tags');config.platform=val('web_platform');
    config.speakers=val('web_speakers');config.meetingLink=val('web_link');config.maxAttendees=intVal('web_maxAttendees');
    config.enableQA=getToggleState('web_qa');config.webinarStart=val('web_start');config.duration=intVal('web_duration');
    config.timezone=val('web_timezone');config.allowReplay=getToggleState('web_replay');config.accessType=getRadioValue('web_access');
    config.audience=collectAudience('web');config.requireRegistration=getToggleState('web_registration');
    config.sendInvites=checked('web_invites');config.sendReminders=checked('web_reminders');

  else if(type==='Talent Development Programs'){
    config.programType=val('td_programType');
    config.assessments=getMultiSelected('td_assessments');config.training=getMultiSelected('td_training');

  }
  return config;
}

function saveProject(){
  var name=document.getElementById('fpName').value.trim();
  if(!name){showToast('Enter a project name');return}

  var project={
    Project_ID:window._currentProjectId||generateProjectId(window._selectedType||'Assessments'),
    Project_Category:window._selectedType||'Assessments',
    Project_Name:name,
    Project_Type:window._selectedType||'Assessments',
    Project_Status:document.getElementById('fpStatus').value,
    Priority:document.getElementById('fpPriority').value,
    Project_Owner:document.getElementById('fpOwner').value==='__custom'?'':document.getElementById('fpOwner').value,
    Observers:getMultiSelected('fpObservers'),
    typeConfig:collectTypeConfig(),
    subProjects:window._pendingActivities.slice(),
    Description:document.getElementById('fpDesc').value.trim(),
    Goals_Objectives:document.getElementById('fpGoals').value.trim(),
    Created_At:new Date().toISOString()
  };

  var projects=loadProjects();
  projects.push(project);
  saveProjectsStore(projects);
  window._lastSavedIdx=projects.length-1;
  window._pendingActivities=[];
  showToast('Project "'+name+'" saved with '+(project.subProjects.length||0)+' activities');
  renderSubProjects(projects.length-1);
}

function addPendingActivity(){
  var name=document.getElementById('pendSubName').value.trim();
  if(!name){showToast('Enter activity name');return}
  window._pendingActivities.push({
    id:'ACT-'+String(Date.now()).slice(-6),
    name:name,
    type:document.getElementById('pendSubType').value,
    assignedTo:document.getElementById('pendSubAssign').value,
    status:document.getElementById('pendSubStatus').value,
    dueDate:document.getElementById('pendSubDue').value,
    notes:document.getElementById('pendSubNotes').value.trim(),
    createdAt:new Date().toISOString()
  });
  var el=document.getElementById('subProjectSection');
  if(el) el.innerHTML=renderPendingActivities();
  showToast('Activity "'+name+'" added');
}

function removePendingActivity(idx){
  window._pendingActivities.splice(idx,1);
  var el=document.getElementById('subProjectSection');
  if(el) el.innerHTML=renderPendingActivities();
  showToast('Activity removed');
}

  var p=projects[projIdx];if(!p)return;
  if(!p.subProjects)p.subProjects=[];
  p.subProjects.push({id:'ACT-'+String(Date.now()).slice(-6),name:name,type:document.getElementById('subType').value,assignedTo:document.getElementById('subAssign').value,status:document.getElementById('subStatus').value,dueDate:document.getElementById('subDue').value,notes:document.getElementById('subNotes').value.trim(),createdAt:new Date().toISOString()});
  saveProjectsStore(projects);
  renderSubProjects(projIdx);
  showToast('Activity "'+name+'" added');
}

function removeSubFromAdd(projIdx,subIdx){
  var projects=loadProjects();
  var p=projects[projIdx];if(!p||!p.subProjects)return;
  p.subProjects.splice(subIdx,1);
  saveProjectsStore(projects);
  renderSubProjects(projIdx);
  showToast('Activity removed');
}
