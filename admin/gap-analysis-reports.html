<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gap Analysis Reports · Edstellar SIP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/design-system.css">
<style>
/* ══════════════════════════════════════════════════════════════
   GAP ANALYSIS REPORTS — PAGE-SPECIFIC STYLES
   ══════════════════════════════════════════════════════════════ */

/* ── LOCAL TOKENS ── */
:root{
  --surface:var(--card);
  --surface-alt:#F5F4F0;
  --border:#E5E7EB;
  --border-focus:var(--accent);
  --text:var(--text-primary);
  --text-s:var(--text-secondary);
  --text-t:var(--text-muted);
  --text-inv:#FFFFFF;
  --radius-sm:6px;--radius-md:10px;--radius-lg:16px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.12);
  --chart-blue:#3B82F6;
  --chart-green:#10B981;
  --chart-amber:#F59E0B;
  --chart-red:#EF4444;
  --chart-purple:#8B5CF6;
  --chart-pink:#EC4899;
  --chart-gray:#6B7280;
}

/* ── SCROLLABLE CONTENT ── */
.report-scroll{height:100%;overflow-y:auto;padding:0}
.report-scroll::-webkit-scrollbar{width:5px}
.report-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08);border-radius:3px}
.report-container{max-width:1320px;margin:0 auto;padding:24px 28px 60px}

/* ── PAGE HEADER ── */
.page-header{margin-bottom:20px}
.page-header h1{font-family:var(--font-display);font-size:24px;font-weight:600;color:var(--text);margin-bottom:4px}
.page-header p{font-size:13px;color:var(--text-s)}

/* ── TAB BAR ── */
.report-tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.report-tabs::-webkit-scrollbar{display:none}
.report-tab{padding:10px 16px;font-family:var(--font-body);font-size:12px;font-weight:500;color:var(--text-s);background:none;border:none;cursor:pointer;white-space:nowrap;position:relative;transition:color .2s;border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.report-tab:hover{color:var(--text);background:rgba(0,0,0,0.02)}
.report-tab.active{color:var(--accent);font-weight:600}
.report-tab.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--accent);border-radius:1px 1px 0 0}

/* ── TAB PANELS ── */
.tab-panel{display:none;animation:panelFadeIn .3s ease}
.tab-panel.active{display:block}
@keyframes panelFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── SECTION HEADER ── */
.section-head{margin-bottom:16px}
.section-head h2{font-family:var(--font-display);font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px}
.section-head p{font-size:12px;color:var(--text-s)}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 18px;transition:box-shadow .2s,transform .15s}
.kpi-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.kpi-value{font-family:var(--font-display);font-size:28px;font-weight:600;color:var(--text);line-height:1;margin-bottom:4px}
.kpi-label{font-size:11px;color:var(--text-s);letter-spacing:.02em}
.kpi-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.kpi-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}

/* ── CARDS/PANELS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;margin-bottom:20px}
.card-head{padding:14px 20px;border-bottom:1px solid rgba(0,0,0,0.06);display:flex;align-items:center;gap:10px}
.card-title{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--text);flex:1}
.card-badge{padding:2px 8px;border-radius:100px;font-size:10px;font-weight:500;background:var(--accent-lt);color:var(--accent)}
.card-body{padding:18px 20px}

/* ── GRID LAYOUTS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
@media(max-width:960px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* ── HORIZONTAL BAR CHART ── */
.h-bar-chart{display:flex;flex-direction:column;gap:8px}
.h-bar-row{display:flex;align-items:center;gap:10px}
.h-bar-label{width:120px;font-size:11px;color:var(--text-s);text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h-bar-track{flex:1;height:22px;background:rgba(0,0,0,0.03);border-radius:4px;overflow:hidden;position:relative}
.h-bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.25,.46,.45,.94);display:flex;align-items:center;justify-content:flex-end;padding-right:6px;min-width:0}
.h-bar-val{font-size:10px;font-weight:600;color:var(--text-inv);white-space:nowrap}
.h-bar-val-out{font-size:10px;font-weight:500;color:var(--text-s);margin-left:6px;flex-shrink:0;width:30px}

/* ── STACKED BAR ── */
.stacked-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.stacked-bar-label{width:120px;font-size:11px;color:var(--text-s);text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stacked-bar-track{flex:1;height:22px;background:rgba(0,0,0,0.03);border-radius:4px;overflow:hidden;display:flex}
.stacked-bar-seg{height:100%;transition:width .6s ease}

/* ── DONUT CHART ── */
.donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.donut{width:140px;height:140px;border-radius:50%;position:relative;flex-shrink:0}
.donut-hole{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;flex-direction:column}
.donut-center-val{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--text);line-height:1}
.donut-center-label{font-size:9px;color:var(--text-s);margin-top:2px}
.donut-legend{display:flex;flex-direction:column;gap:6px;flex:1;min-width:120px}
.donut-legend-item{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-s)}
.donut-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.donut-legend-val{margin-left:auto;font-weight:600;color:var(--text);font-family:var(--font-mono);font-size:11px}

/* ── DATA TABLES ── */
.data-table-wrap{overflow-x:auto;margin:0 -20px;padding:0 20px}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{text-align:left;padding:8px 10px;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-t);border-bottom:2px solid var(--border);background:rgba(0,0,0,0.01);white-space:nowrap}
.data-table td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,0.04);color:var(--text-s);vertical-align:top}
.data-table tbody tr:nth-child(even){background:rgba(0,0,0,0.015)}
.data-table tbody tr:hover{background:rgba(201,168,76,0.04)}
.data-table .mono{font-family:var(--font-mono);font-size:11px}
.data-table .tag{display:inline-block;padding:1px 7px;border-radius:100px;font-size:10px;font-weight:500}

/* ── STATUS GRID ── */
.status-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.status-cell{padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);text-align:center;transition:transform .15s}
.status-cell:hover{transform:translateY(-1px)}
.status-cell-label{font-size:10px;font-weight:600;color:var(--text-s);letter-spacing:.03em;margin-bottom:4px}
.status-cell-val{font-family:var(--font-display);font-size:16px;font-weight:600;line-height:1}
.status-cell.green{background:var(--green-bg);border-color:#A7F3D0}.status-cell.green .status-cell-val{color:var(--green)}
.status-cell.amber{background:var(--amber-bg);border-color:#FDE68A}.status-cell.amber .status-cell-val{color:var(--amber)}
.status-cell.red{background:var(--red-bg);border-color:#FECACA}.status-cell.red .status-cell-val{color:var(--red)}
.status-cell.gray{background:#F9FAFB;border-color:var(--border)}.status-cell.gray .status-cell-val{color:var(--chart-gray)}

/* ── PROFICIENCY CELLS ── */
.prof-cell{display:inline-flex;align-items:center;justify-content:center;width:28px;height:22px;border-radius:4px;font-size:10px;font-weight:600;color:#fff}
.prof-L1{background:var(--l1,#3B82F6)}.prof-L2{background:var(--l2,#10B981)}.prof-L3{background:var(--l3,#F59E0B)}.prof-L4{background:var(--l4,#EF4444)}
.prof-empty{background:rgba(0,0,0,0.04);color:var(--text-t)}

/* ── METRIC CARD ── */
.metric-card{text-align:center;padding:24px;background:linear-gradient(135deg,rgba(201,168,76,0.04),rgba(201,168,76,0.01));border:1px solid rgba(201,168,76,0.15);border-radius:var(--radius-md)}
.metric-big{font-family:var(--font-display);font-size:48px;font-weight:600;color:var(--accent);line-height:1;margin-bottom:6px}
.metric-label{font-size:12px;color:var(--text-s)}
.metric-sub{font-size:11px;color:var(--text-t);margin-top:4px}

/* ── EMPTY STATE ── */
.empty-state{padding:40px 20px;text-align:center;color:var(--text-t)}
.empty-state svg{width:48px;height:48px;stroke:var(--text-t);fill:none;stroke-width:1.5;margin-bottom:12px}
.empty-state h3{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--text-s);margin-bottom:6px}
.empty-state p{font-size:13px;max-width:420px;margin:0 auto;line-height:1.6}
.empty-state a{color:var(--accent);text-decoration:none;font-weight:500}
.empty-state a:hover{text-decoration:underline}

/* ── FORMULA BOX ── */
.formula-box{padding:14px 18px;background:rgba(0,0,0,0.02);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:12px;color:var(--text-s);margin-top:12px;line-height:1.7}
.formula-box strong{color:var(--text);font-weight:500}

/* ── HEATMAP GRID ── */
.heatmap-grid{display:grid;gap:2px}
.heatmap-cell{padding:6px 4px;text-align:center;font-size:10px;font-weight:500;border-radius:3px}
.heatmap-cell.critical{background:#FEE2E2;color:#DC2626}
.heatmap-cell.high{background:#FEF3C7;color:#D97706}
.heatmap-cell.medium{background:#DBEAFE;color:#2563EB}
.heatmap-cell.low{background:#D1FAE5;color:#059669}
.heatmap-cell.none{background:#F3F4F6;color:#9CA3AF}
.heatmap-header{font-size:9px;font-weight:600;color:var(--text-t);text-transform:uppercase;letter-spacing:.04em;padding:6px 4px}

/* ── COMPLETENESS BAR ── */
.completeness-bar{height:6px;background:rgba(0,0,0,0.06);border-radius:3px;overflow:hidden;flex:1}
.completeness-fill{height:100%;border-radius:3px;transition:width .6s ease}

/* ── PLACEHOLDER NOTE ── */
.placeholder-note{padding:16px 20px;background:var(--blue-bg,#EFF6FF);border:1px solid rgba(37,99,235,0.15);border-radius:var(--radius-sm);font-size:12px;color:var(--blue,#2563EB);display:flex;align-items:flex-start;gap:10px;margin-bottom:16px}
.placeholder-note svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;margin-top:1px}
</style>
</head>

<script>
(function(){

  var CHART_COLORS = ['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#6B7280','#0891B2','#C9A84C','#14B8A6'];
  var orgState = null;
  var empData = null;

  /* ── UTILITIES ── */
  function stableRandom(seed){ var x=Math.sin(seed)*10000; return x-Math.floor(x); }
  function stableInt(seed,min,max){ return min+Math.floor(stableRandom(seed)*(max-min+1)); }
  function safe(arr){return Array.isArray(arr)?arr:[]}
  function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
  function countMap(arr,key){var m={};arr.forEach(function(x){var k=x[key]||'Other';m[k]=(m[k]||0)+1});return m}
  function pct(n,t){return t?Math.round(n/t*100):0}
  function hashStr(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h)}
  function profToNum(p){if(!p)return 0;var s=String(p);var m=s.match(/(\d)/);return m?parseInt(m[1]):0}

  function getBlockData(id){
    if(!orgState||!orgState.blocks) return null;
    var blocks=orgState.blocks;
    if(Array.isArray(blocks)){
      var b=blocks.find(function(x){return x.id===id});
      return b&&b.data?b.data:null;
    }
    if(blocks[id]&&blocks[id].data) return blocks[id].data;
    return null;
  }

  function getSkills(){var j=getBlockData('J');return safe(j&&j.skills)}
  function getCompetencies(){var k=getBlockData('K');return safe(k&&k.competencies)}
  function getRoles(){var l=getBlockData('L');return safe(l&&l.roles)}
  function getEmployees(){return safe(empData&&empData.employees)}
  function getDepartments(){
    var emps=getEmployees();
    var m={};emps.forEach(function(e){if(e.department)m[e.department]=true});
    var keys=Object.keys(m);
    return keys.length?keys:['Product Engineering','Customer Success','Sales & Marketing','Corporate Functions'];
  }

  /* ── BAR CHART BUILDER ── */
  function buildHBars(data,maxVal,colorFn){
    if(!maxVal) maxVal=Math.max.apply(null,data.map(function(d){return d.value}))||1;
    return '<div class="h-bar-chart">'+data.map(function(d,i){
      var w=Math.max(2,Math.round(d.value/maxVal*100));
      var c=colorFn?colorFn(d,i):CHART_COLORS[i%CHART_COLORS.length];
      return '<div class="h-bar-row">'+
        '<span class="h-bar-label" title="'+esc(d.label)+'">'+esc(d.label)+'</span>'+
        '<div class="h-bar-track"><div class="h-bar-fill" style="width:'+w+'%;background:'+c+'"><span class="h-bar-val">'+(w>15?d.value:'')+'</span></div></div>'+
        '<span class="h-bar-val-out">'+(w<=15?d.value:'')+'</span>'+
      '</div>';
    }).join('')+'</div>';
  }

  /* ── DUAL BAR BUILDER ── */
  function buildDualBars(data,maxVal){
    if(!maxVal) maxVal=Math.max.apply(null,data.map(function(d){return Math.max(d.required||0,d.current||0)}))||1;
    return data.map(function(d){
      var wR=Math.max(2,Math.round((d.required||0)/maxVal*100));
      var wC=Math.max(2,Math.round((d.current||0)/maxVal*100));
      return '<div style="margin-bottom:10px">'+
        '<div style="font-size:11px;color:var(--text-s);margin-bottom:4px">'+esc(d.label)+'</div>'+
        '<div class="h-bar-row" style="margin-bottom:2px"><span class="h-bar-label" style="width:60px;font-size:10px">Required</span><div class="h-bar-track"><div class="h-bar-fill" style="width:'+wR+'%;background:var(--chart-blue)"><span class="h-bar-val">'+(wR>15?d.required:'')+'</span></div></div><span class="h-bar-val-out">'+d.required+'</span></div>'+
        '<div class="h-bar-row"><span class="h-bar-label" style="width:60px;font-size:10px">Current</span><div class="h-bar-track"><div class="h-bar-fill" style="width:'+wC+'%;background:var(--chart-green)"><span class="h-bar-val">'+(wC>15?d.current:'')+'</span></div></div><span class="h-bar-val-out">'+d.current+'</span></div>'+
      '</div>';
    }).join('');
  }

  /* ── DONUT BUILDER ── */
  function buildDonut(segments,total,centerLabel){
    var conic=[],deg=0;
    segments.forEach(function(s,i){
      var angle=total?s.value/total*360:0;
      var c=s.color||CHART_COLORS[i%CHART_COLORS.length];
      conic.push(c+' '+deg.toFixed(1)+'deg '+(deg+angle).toFixed(1)+'deg');
      s._color=c;
      deg+=angle;
    });
    if(deg<360) conic.push('rgba(0,0,0,0.04) '+deg.toFixed(1)+'deg 360deg');
    var legend=segments.map(function(s){
      return '<div class="donut-legend-item"><span class="donut-legend-dot" style="background:'+s._color+'"></span>'+esc(s.label)+'<span class="donut-legend-val">'+s.value+'</span></div>';
    }).join('');
    return '<div class="donut-wrap">'+
      '<div class="donut" style="background:conic-gradient('+conic.join(',')+')"><div class="donut-hole"><span class="donut-center-val">'+total+'</span><span class="donut-center-label">'+(centerLabel||'Total')+'</span></div></div>'+
      '<div class="donut-legend">'+legend+'</div></div>';
  }

  /* ── TABLE BUILDER ── */
  function buildTable(cols,rows,opts){
    opts=opts||{};
    var h='<div class="data-table-wrap"><table class="data-table"><thead><tr>'+cols.map(function(c){return '<th>'+esc(c.label||c.key)+'</th>'}).join('')+'</tr></thead><tbody>';
    var shown=opts.limit?rows.slice(0,opts.limit):rows;
    shown.forEach(function(r){
      h+='<tr>'+cols.map(function(c){
        var v=c.render?c.render(r):esc(r[c.key]||'');
        var cls=c.cls?' class="'+c.cls+'"':'';
        return '<td'+cls+'>'+v+'</td>';
      }).join('')+'</tr>';
    });
    h+='</tbody></table>';
    if(opts.limit&&rows.length>opts.limit) h+='<div style="padding:8px 10px;font-size:11px;color:var(--text-t)">Showing '+opts.limit+' of '+rows.length+' rows</div>';
    h+='</div>';
    return h;
  }

  /* ── HEATMAP BUILDER ── */
  function buildHeatmap(rowLabels,colLabels,cells){
    var cols=colLabels.length+1;
    var html='<div class="heatmap-grid" style="grid-template-columns:120px repeat('+(cols-1)+',1fr)">';
    html+='<div class="heatmap-header"></div>';
    colLabels.forEach(function(c){html+='<div class="heatmap-header">'+esc(c)+'</div>'});
    rowLabels.forEach(function(r,ri){
      html+='<div class="heatmap-header" style="text-align:right">'+esc(r)+'</div>';
      colLabels.forEach(function(c,ci){
        var cell=cells[ri]&&cells[ri][ci]?cells[ri][ci]:{value:'-',severity:'none'};
        html+='<div class="heatmap-cell '+cell.severity+'">'+cell.value+'</div>';
      });
    });
    html+='</div>';
    return html;
  }

  /* ── GAP SEVERITY ── */
  function gapSeverity(gap){
    if(gap>=3) return 'critical';
    if(gap>=2) return 'high';
    if(gap>=1) return 'medium';
    if(gap>0) return 'low';
    return 'none';
  }
  function gapSeverityLabel(gap){
    if(gap>=3) return 'Critical';
    if(gap>=2) return 'High';
    if(gap>=1) return 'Medium';
    if(gap>0) return 'Low';
    return 'No Gap';
  }
  function severityColor(sev){
    var m={critical:'var(--chart-red)',high:'var(--chart-amber)',medium:'var(--chart-blue)',low:'var(--chart-green)',none:'var(--chart-gray)'};
    return m[sev]||m.none;
  }

  /* ── SIMULATE CURRENT LEVEL ── */
  function simulateCurrent(skillName,targetProf,deptOrRole){
    var seed=hashStr(skillName+(deptOrRole||''));
    var target=profToNum(targetProf);
    var sub=stableInt(seed,0,2);
    return Math.max(0,target-sub);
  }

  /* ══════════════════════════════════════════════════════════
     TAB 1: SKILL GAP ANALYSIS REPORT
     ══════════════════════════════════════════════════════════ */
  function renderSkillGap(){
    var skills=getSkills(), roles=getRoles(), depts=getDepartments();
    var html='<div class="section-head"><h2>Skill Gap Analysis Report</h2><p>Employee-level comparison of current vs required skill proficiency</p></div>';

    // Compute per-skill gap data
    var skillGaps=[];
    var sevCounts={critical:0,high:0,medium:0,low:0,none:0};
    var allRoleSkills=[];
    roles.forEach(function(role){
      safe(role.requiredSkills).forEach(function(rs){
        var target=profToNum(rs.targetProficiency);
        var current=simulateCurrent(rs.skillName,rs.targetProficiency,role.title);
        var gap=Math.max(0,target-current);
        allRoleSkills.push({skill:rs.skillName,role:role.title,target:target,current:current,gap:gap});
        sevCounts[gapSeverity(gap)]++;
      });
    });

    // Aggregate per skill
    var skillMap={};
    allRoleSkills.forEach(function(rs){
      if(!skillMap[rs.skill]) skillMap[rs.skill]={totalTarget:0,totalCurrent:0,count:0,totalGap:0};
      skillMap[rs.skill].totalTarget+=rs.target;
      skillMap[rs.skill].totalCurrent+=rs.current;
      skillMap[rs.skill].totalGap+=rs.gap;
      skillMap[rs.skill].count++;
    });
    var skillAgg=Object.keys(skillMap).map(function(k){
      var s=skillMap[k];
      return {label:k,required:Math.round(s.totalTarget/s.count*10)/10,current:Math.round(s.totalCurrent/s.count*10)/10,gap:Math.round(s.totalGap/s.count*10)/10};
    }).sort(function(a,b){return b.gap-a.gap});

    var totalGapScore=skillAgg.reduce(function(s,x){return s+x.gap},0);
    var avgGap=skillAgg.length?Math.round(totalGapScore/skillAgg.length*10)/10:0;

    // KPIs
    html+='<div class="kpi-grid">';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:var(--red-bg,#FEF2F2);color:var(--chart-red)"><svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg></div><div class="kpi-value">'+avgGap+'</div><div class="kpi-label">Avg Skill Gap Score</div></div>';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:var(--blue-bg,#EFF6FF);color:var(--chart-blue)"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/></svg></div><div class="kpi-value">'+skillAgg.length+'</div><div class="kpi-label">Skills Assessed</div></div>';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:#FEE2E2;color:#DC2626"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></div><div class="kpi-value">'+sevCounts.critical+'</div><div class="kpi-label">Critical Gaps</div></div>';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:#FEF3C7;color:#D97706"><svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01"/></svg></div><div class="kpi-value">'+sevCounts.high+'</div><div class="kpi-label">High Gaps</div></div>';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:var(--green-bg,#ECFDF5);color:var(--chart-green)"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div><div class="kpi-value">'+sevCounts.none+'</div><div class="kpi-label">No Gap</div></div>';
    html+='</div>';

    html+='<div class="placeholder-note"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> Gap scores are simulated from role requirements. Actual assessment data will replace these when available.</div>';

    html+='<div class="grid-2">';

    // Chart: Skill Gap Comparison
    html+='<div class="card"><div class="card-head"><span class="card-title">Skill Gap Comparison</span><span class="card-badge">Required vs Current</span></div><div class="card-body">';
    html+=buildDualBars(skillAgg.slice(0,12),4);
    html+='</div></div>';

    // Chart: Gap Severity Distribution
    var sevSegs=[
      {label:'Critical',value:sevCounts.critical,color:'#EF4444'},
      {label:'High',value:sevCounts.high,color:'#F59E0B'},
      {label:'Medium',value:sevCounts.medium,color:'#3B82F6'},
      {label:'Low',value:sevCounts.low,color:'#10B981'},
      {label:'No Gap',value:sevCounts.none,color:'#6B7280'}
    ];
    var sevTotal=sevSegs.reduce(function(s,x){return s+x.value},0);
    html+='<div class="card"><div class="card-head"><span class="card-title">Gap Severity Distribution</span><span class="card-badge">'+sevTotal+' assessments</span></div><div class="card-body">';
    html+=buildDonut(sevSegs,sevTotal,'Assessments');
    html+='</div></div>';

    html+='</div>'; // grid-2

    // Heatmap: Department x Skill Gap
    var topSkills=skillAgg.slice(0,10).map(function(s){return s.label});
    var heatCells=[];
    depts.forEach(function(dept,di){
      var row=[];
      topSkills.forEach(function(sk,si){
        var seed=hashStr(dept+sk);
        var target=3;
        skillAgg.forEach(function(sa){if(sa.label===sk)target=Math.round(sa.required)});
        var current=simulateCurrent(sk,target,dept);
        var gap=Math.max(0,target-current);
        row.push({value:gap.toFixed(1),severity:gapSeverity(gap)});

  function renderCompGap(){

    html+='<div class="card"><div class="card-head"><span class="card-title">Competency Gap: Org Score vs Industry Benchmark</span></div><div class="card-body">';
    var compBarData=compGaps.map(function(c){return{label:c.name,required:c.benchmark,current:c.orgScore}});
    html+=buildDualBars(compBarData,100);
    html+='</div></div>';

    // Table
    html+='<div class="card"><div class="card-head"><span class="card-title">Competency Details</span><span class="card-badge">'+compGaps.length+' competencies</span></div><div class="card-body">';

      {key:'name',label:'Competency'},
      {key:'type',label:'Type'},
      {key:'orgScore',label:'Org Score',cls:'mono'},
      {key:'benchmark',label:'Benchmark',cls:'mono'},
      {key:'gap',label:'Gap',render:function(r){var c=r.gap>15?'color:var(--chart-red)':r.gap>5?'color:var(--chart-amber)':'color:var(--chart-green)';return '<span class="mono" style="'+c+'">'+r.gap+'</span>'}},
      {key:'csi',label:'CSI',render:function(r){var c=r.csi<0.8?'background:var(--red-bg,#FEF2F2);color:var(--chart-red)':r.csi<1?'background:var(--amber-bg,#FFFBEB);color:var(--chart-amber)':'background:var(--green-bg,#ECFDF5);color:var(--chart-green)';return '<span class="tag" style="'+c+'">'+r.csi+'</span>'}}
    ],compGaps);
    html+='</div></div>';

    html+='<div class="formula-box"><strong>Competency Strength Index (CSI)</strong> = Org Score / Industry Benchmark<br>CSI >= 1.0 = Meets/Exceeds benchmark &middot; CSI < 0.8 = Critical gap</div>';

    document.getElementById('panel-compgap').innerHTML=html;

  /* ══════════════════════════════════════════════════════════
     TAB 6: ROLE CAPABILITY SCORE
     ══════════════════════════════════════════════════════════ */
  function renderRoleCap(){
    var roles=getRoles();
    var html='<div class="section-head"><h2>Role Capability Score</h2><p>Overall capability readiness per role</p></div>';

    var roleScores=[];
    roles.forEach(function(role){
      var reqSkills=safe(role.requiredSkills);
      var met=0;
      reqSkills.forEach(function(rs){
        var target=profToNum(rs.targetProficiency);
        var current=simulateCurrent(rs.skillName,rs.targetProficiency,role.title);
        if(current>=target) met++;
      });
      var total=reqSkills.length||1;
      var score=Math.round(met/total*100);
      roleScores.push({title:role.title,family:role.family||'-',seniority:role.seniority||'-',met:met,total:reqSkills.length,score:score});
    });
    roleScores.sort(function(a,b){return b.score-a.score});

    var avgScore=roleScores.length?Math.round(roleScores.reduce(function(s,r){return s+r.score},0)/roleScores.length):0;
    var readyRoles=roleScores.filter(function(r){return r.score>=75}).length;

    // KPIs

      {key:'title',label:'Role'},

      {key:'seniority',label:'Seniority'},
      {key:'met',label:'Skills Met',cls:'mono'},
      {key:'total',label:'Total Skills',cls:'mono'},
      {key:'score',label:'Score',render:function(r){var c=r.score>=75?'background:var(--green-bg,#ECFDF5);color:var(--chart-green)':r.score>=50?'background:var(--amber-bg,#FFFBEB);color:var(--chart-amber)':'background:var(--red-bg,#FEF2F2);color:var(--chart-red)';return '<span class="tag" style="'+c+'">'+r.score+'%</span>'}},
      {key:'status',label:'Status',render:function(r){return r.score>=75?'<span class="tag" style="background:var(--green-bg,#ECFDF5);color:var(--chart-green)">Ready</span>':r.score>=50?'<span class="tag" style="background:var(--amber-bg,#FFFBEB);color:var(--chart-amber)">Developing</span>':'<span class="tag" style="background:var(--red-bg,#FEF2F2);color:var(--chart-red)">Critical Gap</span>'}}

  /* ══════════════════════════════════════════════════════════
     TAB 7: WORKFORCE CAPABILITY SCORE
     ══════════════════════════════════════════════════════════ */
  function renderWorkforce(){
    var emps=getEmployees(), roles=getRoles(), depts=getDepartments();
    var html='<div class="section-head"><h2>Workforce Capability Score</h2><p>Aggregated capability across all employees</p></div>';

    // Simulate per-employee capability
    var empScores=[];
    emps.forEach(function(emp,ei){
      var score=stableInt(hashStr(emp.id||emp.fullName||('emp'+ei)+'cap'),35,95);
      empScores.push({name:emp.fullName||emp.firstName+' '+emp.lastName,department:emp.department,role:emp.role,score:score});
    });

    var wci=empScores.length?Math.round(empScores.reduce(function(s,e){return s+e.score},0)/empScores.length):0;
    var highCap=empScores.filter(function(e){return e.score>=80}).length;
    var lowCap=empScores.filter(function(e){return e.score<50}).length;

    // KPIs
    html+='<div class="kpi-grid">';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:rgba(201,168,76,0.08);color:var(--accent)"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg></div><div class="kpi-value">'+wci+'%</div><div class="kpi-label">Workforce Capability Index</div></div>';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:var(--green-bg,#ECFDF5);color:var(--chart-green)"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div><div class="kpi-value">'+highCap+'</div><div class="kpi-label">High Capability (80%+)</div></div>';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:var(--red-bg,#FEF2F2);color:var(--chart-red)"><svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01"/></svg></div><div class="kpi-value">'+lowCap+'</div><div class="kpi-label">Low Capability (&lt;50%)</div></div>';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:var(--blue-bg,#EFF6FF);color:var(--chart-blue)"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div class="kpi-value">'+emps.length+'</div><div class="kpi-label">Total Employees</div></div>';
    html+='</div>';

    html+='<div class="grid-2">';

    // Capability distribution (bell curve as bar chart)
    var buckets=[{label:'0-20%',min:0,max:20},{label:'21-40%',min:21,max:40},{label:'41-60%',min:41,max:60},{label:'61-80%',min:61,max:80},{label:'81-100%',min:81,max:100}];
    var distData=buckets.map(function(b){
      var count=empScores.filter(function(e){return e.score>=b.min&&e.score<=b.max}).length;
      return{label:b.label,value:count};
    });
    html+='<div class="card"><div class="card-head"><span class="card-title">Capability Distribution</span></div><div class="card-body">';
    html+=buildHBars(distData,null,function(d,i){return CHART_COLORS[i]});
    html+='</div></div>';

    // Department capability comparison
    var deptCap={};
    empScores.forEach(function(e){
      if(!deptCap[e.department]) deptCap[e.department]={total:0,count:0};
      deptCap[e.department].total+=e.score;
      deptCap[e.department].count++;
    });
    var deptCapData=Object.keys(deptCap).map(function(k){return{label:k,value:Math.round(deptCap[k].total/deptCap[k].count)}}).sort(function(a,b){return b.value-a.value});
    html+='<div class="card"><div class="card-head"><span class="card-title">Department Capability Comparison</span></div><div class="card-body">';
    html+=buildHBars(deptCapData,100,function(d){return d.value>=70?'var(--chart-green)':d.value>=50?'var(--chart-amber)':'var(--chart-red)'});
    html+='</div></div>';

    html+='</div>';

    html+='<div class="formula-box"><strong>Workforce Capability Index (WCI)</strong> = Average Capability Score across all employees</div>';

    document.getElementById('panel-workforce').innerHTML=html;
  }

  /* ══════════════════════════════════════════════════════════
     TAB 8: SKILL DISTRIBUTION BY DEPARTMENT
     ══════════════════════════════════════════════════════════ */
  function renderSkillDist(){
    var skills=getSkills(), roles=getRoles(), depts=getDepartments();
    var html='<div class="section-head"><h2>Skill Distribution by Department</h2><p>How skills distribute across departments</p></div>';

    // Get all required skills
    var allSkillNames={};
    roles.forEach(function(r){safe(r.requiredSkills).forEach(function(rs){allSkillNames[rs.skillName]=true})});
    var skillNames=Object.keys(allSkillNames);
    var totalRequired=skillNames.length;

    // Per department coverage
    var deptCoverage={};
    depts.forEach(function(dept){
      var covered=0;
      skillNames.forEach(function(sk){
        var seed=hashStr(dept+sk+'dist');
        if(stableRandom(seed)>0.3) covered++;
      });
      deptCoverage[dept]={covered:covered,total:totalRequired,ratio:Math.round(covered/totalRequired*100)};
    });

    var avgCoverage=depts.length?Math.round(depts.reduce(function(s,d){return s+deptCoverage[d].ratio},0)/depts.length):0;

    // KPIs
    html+='<div class="kpi-grid">';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:var(--blue-bg,#EFF6FF);color:var(--chart-blue)"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/></svg></div><div class="kpi-value">'+totalRequired+'</div><div class="kpi-label">Total Required Skills</div></div>';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:var(--green-bg,#ECFDF5);color:var(--chart-green)"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg></div><div class="kpi-value">'+avgCoverage+'%</div><div class="kpi-label">Avg Skill Coverage Ratio</div></div>';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:var(--purple-bg,#F5F3FF);color:var(--chart-purple)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></div><div class="kpi-value">'+depts.length+'</div><div class="kpi-label">Departments</div></div>';
    html+='</div>';

    // Department skill balance bars
    var deptBalData=depts.map(function(d){return{label:d,value:deptCoverage[d].ratio}}).sort(function(a,b){return b.value-a.value});
    html+='<div class="card"><div class="card-head"><span class="card-title">Department Skill Coverage Balance</span><span class="card-badge">% skills covered</span></div><div class="card-body">';
    html+=buildHBars(deptBalData,100,function(d){return d.value>=75?'var(--chart-green)':d.value>=55?'var(--chart-amber)':'var(--chart-red)'});
    html+='</div></div>';

    // Heatmap: Department x Skill distribution
    var topSkills=skillNames.slice(0,12);
    var heatCells=[];
    depts.forEach(function(dept){
      var row=[];
      topSkills.forEach(function(sk){
        var seed=hashStr(dept+sk+'dist');
        var hasCoverage=stableRandom(seed)>0.3;
        var level=hasCoverage?stableInt(seed+1,1,4):0;
        var sev=level>=3?'low':level>=2?'medium':level>=1?'high':'none';
        row.push({value:level?'L'+level:'-',severity:sev});
      });
      heatCells.push(row);
    });
    html+='<div class="card"><div class="card-head"><span class="card-title">Department x Skill Distribution Grid</span></div><div class="card-body" style="overflow-x:auto">';
    html+=buildHeatmap(depts,topSkills,heatCells);
    html+='</div></div>';

    html+='<div class="formula-box"><strong>Skill Coverage Ratio</strong> = Skills Covered in Department / Total Required Skills x 100</div>';

    document.getElementById('panel-skilldist').innerHTML=html;
  }

  /* ══════════════════════════════════════════════════════════
     TAB 10: TRAINING COVERAGE REPORT
     ══════════════════════════════════════════════════════════ */
  function renderTraining(){
    var emps=getEmployees(), depts=getDepartments();
    var html='<div class="section-head"><h2>Training Coverage Report</h2><p>Training coverage gaps by department</p></div>';

    if(!emps.length){
      html+='<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><h3>No employee data</h3><p>Import employee data to view training coverage.</p></div>';
      document.getElementById('panel-training').innerHTML=html;
      return;
    }

    var complete=emps.filter(function(e){return e.skillProfileStatus==='Complete'}).length;
    var partial=emps.filter(function(e){return e.skillProfileStatus==='Partial'}).length;
    var draft=emps.length-complete-partial;
    var coverageRate=pct(complete,emps.length);

    // KPIs
    html+='<div class="kpi-grid">';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:var(--green-bg,#ECFDF5);color:var(--chart-green)"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg></div><div class="kpi-value">'+coverageRate+'%</div><div class="kpi-label">Training Coverage Rate</div></div>';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:var(--blue-bg,#EFF6FF);color:var(--chart-blue)"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div><div class="kpi-value">'+complete+'</div><div class="kpi-label">Complete Profiles</div></div>';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:var(--amber-bg,#FFFBEB);color:var(--chart-amber)"><svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01"/></svg></div><div class="kpi-value">'+partial+'</div><div class="kpi-label">Partial Profiles</div></div>';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:var(--red-bg,#FEF2F2);color:var(--chart-red)"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg></div><div class="kpi-value">'+draft+'</div><div class="kpi-label">Draft/Incomplete</div></div>';
    html+='</div>';

    html+='<div class="grid-2">';

    // Coverage by department bar
    var deptCov={};
    emps.forEach(function(e){
      var d=e.department||'Other';
      if(!deptCov[d]) deptCov[d]={complete:0,total:0};
      deptCov[d].total++;
      if(e.skillProfileStatus==='Complete') deptCov[d].complete++;
    });
    var deptCovData=Object.keys(deptCov).map(function(k){return{label:k,value:pct(deptCov[k].complete,deptCov[k].total)}}).sort(function(a,b){return b.value-a.value});
    html+='<div class="card"><div class="card-head"><span class="card-title">Coverage by Department</span><span class="card-badge">% complete</span></div><div class="card-body">';
    html+=buildHBars(deptCovData,100,function(d){return d.value>=75?'var(--chart-green)':d.value>=50?'var(--chart-amber)':'var(--chart-red)'});
    html+='</div></div>';

    // Skill profile status distribution
    var statusSegs=[
      {label:'Complete',value:complete,color:'#10B981'},
      {label:'Partial',value:partial,color:'#F59E0B'},
      {label:'Draft/Incomplete',value:draft,color:'#EF4444'}
    ];
    html+='<div class="card"><div class="card-head"><span class="card-title">Skill Profile Status Distribution</span></div><div class="card-body">';
    html+=buildDonut(statusSegs,emps.length,'Employees');
    html+='</div></div>';

    html+='</div>';

    html+='<div class="formula-box"><strong>Training Coverage Rate</strong> = Employees with skillProfileStatus = "Complete" / Total Employees x 100</div>';

    document.getElementById('panel-training').innerHTML=html;
  }

  /* ══════════════════════════════════════════════════════════
     TAB 11: DEPARTMENT TRAINING NEEDS
     ══════════════════════════════════════════════════════════ */
  function renderDeptTraining(){
    var emps=getEmployees(), depts=getDepartments();
    var html='<div class="section-head"><h2>Department Training Needs</h2><p>Training needs per department</p></div>';

    if(!emps.length){
      html+='<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg><h3>No employee data</h3><p>Import employee data to view training needs.</p></div>';
      document.getElementById('panel-depttraining').innerHTML=html;
      return;
    }

    html+='<div class="grid-2">';

    // Department gap bar (employees needing training per dept)
    var deptNeed={};
    emps.forEach(function(e){
      var d=e.department||'Other';
      if(!deptNeed[d]) deptNeed[d]={needTraining:0,total:0,critical:0};
      deptNeed[d].total++;
      if(e.skillProfileStatus!=='Complete') deptNeed[d].needTraining++;
      if(e.criticalRole==='Yes'&&e.skillProfileStatus!=='Complete') deptNeed[d].critical++;
    });
    var deptNeedData=Object.keys(deptNeed).map(function(k){return{label:k,value:deptNeed[k].needTraining}}).sort(function(a,b){return b.value-a.value});
    html+='<div class="card"><div class="card-head"><span class="card-title">Employees Needing Training by Department</span></div><div class="card-body">';
    html+=buildHBars(deptNeedData,null,function(d){return d.value>10?'var(--chart-red)':d.value>5?'var(--chart-amber)':'var(--chart-green)'});
    html+='</div></div>';

    // Critical roles by department needing upskilling
    var critData=Object.keys(deptNeed).map(function(k){return{label:k,value:deptNeed[k].critical}}).sort(function(a,b){return b.value-a.value});

  function renderReadiness(){
    var depts=getDepartments(), roles=getRoles();
    var html='<div class="section-head"><h2>Org Skill Readiness Index</h2><p>Quarterly readiness score per department</p></div>';

    // Simulate SRI per department
    var deptSRI={};
    depts.forEach(function(dept){
      var sri=stableInt(hashStr(dept+'SRI2024'),45,92);
      deptSRI[dept]=sri;
    });

    var avgSRI=depts.length?Math.round(depts.reduce(function(s,d){return s+deptSRI[d]},0)/depts.length):0;
    var readyDepts=depts.filter(function(d){return deptSRI[d]>=75}).length;

    // KPIs
    html+='<div class="kpi-grid">';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:rgba(201,168,76,0.08);color:var(--accent)"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg></div><div class="kpi-value">'+avgSRI+'%</div><div class="kpi-label">Org Skill Readiness Index</div></div>';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:var(--green-bg,#ECFDF5);color:var(--chart-green)"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div><div class="kpi-value">'+readyDepts+'</div><div class="kpi-label">Ready Departments (75%+)</div></div>';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:var(--red-bg,#FEF2F2);color:var(--chart-red)"><svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01"/></svg></div><div class="kpi-value">'+(depts.length-readyDepts)+'</div><div class="kpi-label">Departments Below Target</div></div>';
    html+='<div class="kpi-card"><div class="kpi-icon" style="background:var(--blue-bg,#EFF6FF);color:var(--chart-blue)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></div><div class="kpi-value">'+depts.length+'</div><div class="kpi-label">Total Departments</div></div>';
    html+='</div>';

    // Department readiness comparison bar
    var sriData=depts.map(function(d){return{label:d,value:deptSRI[d]}}).sort(function(a,b){return b.value-a.value});
    html+='<div class="card"><div class="card-head"><span class="card-title">Department Readiness Comparison</span><span class="card-badge">Q1 2026</span></div><div class="card-body">';
    html+=buildHBars(sriData,100,function(d){return d.value>=75?'var(--chart-green)':d.value>=55?'var(--chart-amber)':'var(--chart-red)'});
    html+='</div></div>';

    // Heatmap: Department x Readiness status grid
    var quarters=['Q2 2025','Q3 2025','Q4 2025','Q1 2026'];
    var heatCells=[];
    depts.forEach(function(dept,di){
      var row=[];
      quarters.forEach(function(q,qi){
        var base=deptSRI[dept];
        var delta=stableInt(hashStr(dept+q),-(8+qi*2),(5+qi));
        var val=Math.max(20,Math.min(100,base+delta-((3-qi)*5)));
        var sev=val>=75?'low':val>=55?'medium':val>=40?'high':'critical';
        row.push({value:val+'%',severity:sev});
      });
      heatCells.push(row);
    });
    html+='<div class="card"><div class="card-head"><span class="card-title">Quarterly Readiness Trend</span><span class="card-badge">simulated</span></div><div class="card-body">';
    html+=buildHeatmap(depts,quarters,heatCells);
    html+='</div></div>';

    // Status grid
    html+='<div class="card"><div class="card-head"><span class="card-title">Department Readiness Status</span></div><div class="card-body"><div class="status-grid">';
    depts.forEach(function(dept){
      var val=deptSRI[dept];
      var cls=val>=75?'green':val>=55?'amber':'red';
      html+='<div class="status-cell '+cls+'"><div class="status-cell-label">'+esc(dept)+'</div><div class="status-cell-val">'+val+'%</div></div>';
    });
    html+='</div></div></div>';

    html+='<div class="formula-box"><strong>Skill Readiness Index (SRI)</strong> = Simulated readiness score per department based on skill coverage, gap severity, and training completion</div>';

    document.getElementById('panel-readiness').innerHTML=html;
  }

  function switchTab(tab){
    var tabs=document.querySelectorAll('.report-tab');
    for(var i=0;i<tabs.length;i++){
      tabs[i].classList.toggle('active',tabs[i].getAttribute('data-tab')===tab);
    }
    var panels=document.querySelectorAll('.tab-panel');
    for(var i=0;i<panels.length;i++){
      panels[i].classList.toggle('active',panels[i].id==='panel-'+tab);
    }
    if(!rendered[tab]&&renderers[tab]){
      renderers[tab]();
      rendered[tab]=true;
    }
  }

  function loadState(){
    // Load org setup data
    var raw=null;
    try{raw=sessionStorage.getItem('sip_orgsetup_v4')}catch(e){}
    if(!raw){try{raw=localStorage.getItem('sip_orgsetup_v4')}catch(e){}}
    if(raw){try{orgState=JSON.parse(raw)}catch(e){orgState=null}}

    // Load employee data
    var rawEmp=null;
    try{rawEmp=sessionStorage.getItem('sip_dataport_import')}catch(e){}
    if(!rawEmp){try{rawEmp=localStorage.getItem('sip_dataport_import')}catch(e){}}
    if(rawEmp){try{empData=JSON.parse(rawEmp)}catch(e){empData=null}}
  }

  function hasData(){
    var hasOrg=orgState&&orgState.blocks&&(Array.isArray(orgState.blocks)?orgState.blocks.length>0:Object.keys(orgState.blocks).length>0);
    return hasOrg;
  }

  function showReports(){
    document.getElementById('noDataState').style.display='none';
    document.getElementById('tabPanels').style.display='block';
    document.querySelector('.report-tabs').style.display='flex';
    rendered={};
    var tabs=document.querySelectorAll('.report-tab');
    for(var i=0;i<tabs.length;i++){
      tabs[i].addEventListener('click',function(){
        switchTab(this.getAttribute('data-tab'));
      });
    }
    switchTab('skillgap');
  }

  function init(){
    loadState();
    if(!hasData()){
      document.getElementById('noDataState').style.display='block';
      document.getElementById('tabPanels').style.display='none';
      document.querySelector('.report-tabs').style.display='none';
      return;
    }
    showReports();
  }
