<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organization Setup Report · Edstellar SIP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/design-system.css">
<style>
/* ══════════════════════════════════════════════════════════════
   REPORTS PAGE — PAGE-SPECIFIC STYLES
   ══════════════════════════════════════════════════════════════ */

/* ── LOCAL TOKENS ── */
:root{
  --surface:var(--card);
  --surface-alt:#F5F4F0;
  --border:#E5E7EB;
  --border-focus:var(--accent);
  --text:var(--text-primary);
  --text-s:var(--text-secondary);
  --text-t:var(--text-muted);
  --text-inv:#FFFFFF;
  --radius-sm:6px;--radius-md:10px;--radius-lg:16px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.05);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.12);
  --chart-blue:#3B82F6;
  --chart-green:#10B981;
  --chart-amber:#F59E0B;
  --chart-red:#EF4444;
  --chart-purple:#8B5CF6;
  --chart-pink:#EC4899;
  --chart-gray:#6B7280;
}

/* ── SCROLLABLE CONTENT ── */
.report-scroll{height:100%;overflow-y:auto;padding:0}
.report-scroll::-webkit-scrollbar{width:5px}
.report-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08);border-radius:3px}
.report-container{max-width:1320px;margin:0 auto;padding:24px 28px 60px}

/* ── PAGE HEADER ── */
.page-header{margin-bottom:20px}
.page-header h1{font-family:var(--font-display);font-size:24px;font-weight:600;color:var(--text);margin-bottom:4px}
.page-header p{font-size:13px;color:var(--text-s)}

/* ── TAB BAR ── */
.report-tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.report-tabs::-webkit-scrollbar{display:none}
.report-tab{padding:10px 16px;font-family:var(--font-body);font-size:12px;font-weight:500;color:var(--text-s);background:none;border:none;cursor:pointer;white-space:nowrap;position:relative;transition:color .2s;border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.report-tab:hover{color:var(--text);background:rgba(0,0,0,0.02)}
.report-tab.active{color:var(--accent);font-weight:600}
.report-tab.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--accent);border-radius:1px 1px 0 0}

/* ── TAB PANELS ── */
.tab-panel{display:none;animation:panelFadeIn .3s ease}
.tab-panel.active{display:block}
@keyframes panelFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── SECTION HEADER ── */
.section-head{margin-bottom:16px}
.section-head h2{font-family:var(--font-display);font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px}
.section-head p{font-size:12px;color:var(--text-s)}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 18px;transition:box-shadow .2s,transform .15s}
.kpi-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.kpi-value{font-family:var(--font-display);font-size:28px;font-weight:600;color:var(--text);line-height:1;margin-bottom:4px}
.kpi-label{font-size:11px;color:var(--text-s);letter-spacing:.02em}
.kpi-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.kpi-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}

/* ── CARDS/PANELS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;margin-bottom:20px}
.card-head{padding:14px 20px;border-bottom:1px solid rgba(0,0,0,0.06);display:flex;align-items:center;gap:10px}
.card-title{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--text);flex:1}
.card-badge{padding:2px 8px;border-radius:100px;font-size:10px;font-weight:500;background:var(--accent-lt);color:var(--accent)}
.card-body{padding:18px 20px}

/* ── GRID LAYOUTS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
@media(max-width:960px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* ── HORIZONTAL BAR CHART ── */
.h-bar-chart{display:flex;flex-direction:column;gap:8px}
.h-bar-row{display:flex;align-items:center;gap:10px}
.h-bar-label{width:120px;font-size:11px;color:var(--text-s);text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h-bar-track{flex:1;height:22px;background:rgba(0,0,0,0.03);border-radius:4px;overflow:hidden;position:relative}
.h-bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.25,.46,.45,.94);display:flex;align-items:center;justify-content:flex-end;padding-right:6px;min-width:0}
.h-bar-val{font-size:10px;font-weight:600;color:var(--text-inv);white-space:nowrap}
.h-bar-val-out{font-size:10px;font-weight:500;color:var(--text-s);margin-left:6px;flex-shrink:0;width:30px}

/* ── DONUT CHART ── */
.donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.donut{width:140px;height:140px;border-radius:50%;position:relative;flex-shrink:0}
.donut-hole{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;flex-direction:column}
.donut-center-val{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--text);line-height:1}
.donut-center-label{font-size:9px;color:var(--text-s);margin-top:2px}
.donut-legend{display:flex;flex-direction:column;gap:6px;flex:1;min-width:120px}
.donut-legend-item{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-s)}
.donut-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.donut-legend-val{margin-left:auto;font-weight:600;color:var(--text);font-family:var(--font-mono);font-size:11px}

/* ── DATA TABLES ── */
.data-table-wrap{overflow-x:auto;margin:0 -20px;padding:0 20px}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{text-align:left;padding:8px 10px;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-t);border-bottom:2px solid var(--border);background:rgba(0,0,0,0.01);white-space:nowrap}
.data-table td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,0.04);color:var(--text-s);vertical-align:top}
.data-table tbody tr:nth-child(even){background:rgba(0,0,0,0.015)}
.data-table tbody tr:hover{background:rgba(201,168,76,0.04)}
.data-table .mono{font-family:var(--font-mono);font-size:11px}
.data-table .tag{display:inline-block;padding:1px 7px;border-radius:100px;font-size:10px;font-weight:500}

/* ── STATUS GRID ── */
.status-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.status-cell{padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);text-align:center;transition:transform .15s}
.status-cell:hover{transform:translateY(-1px)}
.status-cell-label{font-size:10px;font-weight:600;color:var(--text-s);letter-spacing:.03em;margin-bottom:4px}
.status-cell-val{font-family:var(--font-display);font-size:16px;font-weight:600;line-height:1}
.status-cell.green{background:var(--green-bg);border-color:#A7F3D0}.status-cell.green .status-cell-val{color:var(--green)}
.status-cell.amber{background:var(--amber-bg);border-color:#FDE68A}.status-cell.amber .status-cell-val{color:var(--amber)}
.status-cell.red{background:var(--red-bg);border-color:#FECACA}.status-cell.red .status-cell-val{color:var(--red)}
.status-cell.gray{background:#F9FAFB;border-color:var(--border)}.status-cell.gray .status-cell-val{color:var(--chart-gray)}

/* ── PROFICIENCY CELLS ── */
.prof-cell{display:inline-flex;align-items:center;justify-content:center;width:28px;height:22px;border-radius:4px;font-size:10px;font-weight:600;color:#fff}
.prof-L1{background:var(--l1)}.prof-L2{background:var(--l2)}.prof-L3{background:var(--l3)}.prof-L4{background:var(--l4)}
.prof-empty{background:rgba(0,0,0,0.04);color:var(--text-t)}

/* ── METRIC CARD ── */
.metric-card{text-align:center;padding:24px;background:linear-gradient(135deg,rgba(201,168,76,0.04),rgba(201,168,76,0.01));border:1px solid rgba(201,168,76,0.15);border-radius:var(--radius-md)}
.metric-big{font-family:var(--font-display);font-size:48px;font-weight:600;color:var(--accent);line-height:1;margin-bottom:6px}
.metric-label{font-size:12px;color:var(--text-s)}
.metric-sub{font-size:11px;color:var(--text-t);margin-top:4px}

/* ── GAUGE ── */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.gauge{width:140px;height:70px;position:relative;overflow:hidden}
.gauge-bg{width:140px;height:140px;border-radius:50%;background:conic-gradient(var(--chart-gray) 0deg,var(--chart-gray) 360deg);position:absolute;top:0;left:0;clip-path:polygon(0 0,100% 0,100% 50%,0 50%)}
.gauge-fill{width:140px;height:140px;border-radius:50%;position:absolute;top:0;left:0;clip-path:polygon(0 0,100% 0,100% 50%,0 50%);transition:background .8s}
.gauge-center{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100px;height:50px;border-radius:100px 100px 0 0;background:var(--surface);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px}
.gauge-val{font-family:var(--font-display);font-size:20px;font-weight:600;color:var(--text)}
.gauge-label{font-size:11px;color:var(--text-s);text-align:center}

/* ── EMPTY STATE ── */
.empty-state{padding:40px 20px;text-align:center;color:var(--text-t)}
.empty-state svg{width:48px;height:48px;stroke:var(--text-t);fill:none;stroke-width:1.5;margin-bottom:12px}
.empty-state h3{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--text-s);margin-bottom:6px}
.empty-state p{font-size:13px;max-width:420px;margin:0 auto;line-height:1.6}
.empty-state a{color:var(--accent);text-decoration:none;font-weight:500}
.empty-state a:hover{text-decoration:underline}

/* ── SKELETON ── */
.skel{background:linear-gradient(90deg,rgba(0,0,0,0.04) 25%,rgba(0,0,0,0.07) 50%,rgba(0,0,0,0.04) 75%);background-size:200% 100%;animation:skelShimmer 1.5s infinite;border-radius:4px}
@keyframes skelShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── PLACEHOLDER NOTE ── */
.placeholder-note{padding:16px 20px;background:var(--blue-bg);border:1px solid rgba(37,99,235,0.15);border-radius:var(--radius-sm);font-size:12px;color:var(--blue);display:flex;align-items:flex-start;gap:10px;margin-bottom:16px}
.placeholder-note svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;margin-top:1px}

/* ── COMPLETENESS BAR ── */
.completeness-bar{height:6px;background:rgba(0,0,0,0.06);border-radius:3px;overflow:hidden;flex:1}
.completeness-fill{height:100%;border-radius:3px;transition:width .6s ease}

/* ── FORMULA BOX ── */
.formula-box{padding:14px 18px;background:rgba(0,0,0,0.02);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:12px;color:var(--text-s);margin-top:12px;line-height:1.7}
.formula-box strong{color:var(--text);font-weight:500}

/* ── HEATMAP GRID ── */
.heatmap-grid{display:grid;gap:2px}
.heatmap-cell{padding:6px 4px;text-align:center;font-size:10px;font-weight:500;border-radius:3px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.heatmap-cell.critical{background:#FEE2E2;color:#DC2626}
.heatmap-cell.high{background:#FEF3C7;color:#D97706}
.heatmap-cell.medium{background:#DBEAFE;color:#2563EB}
.heatmap-cell.low{background:#D1FAE5;color:#059669}
.heatmap-cell.none{background:#F3F4F6;color:#9CA3AF}
.heatmap-header{font-size:9px;font-weight:600;color:var(--text-t);text-transform:uppercase;letter-spacing:.04em;padding:6px 4px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.heatmap-row-label{font-size:11px;font-weight:500;color:var(--text-s);padding:6px 8px 6px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── JOURNEY CARD ── */
.journey-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:16px 18px}
.journey-title{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px}
.journey-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.04)}
.journey-row:last-child{border-bottom:none}
.journey-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.journey-label{font-size:12px;color:var(--text-s);flex:1}
.journey-val{font-family:var(--font-display);font-size:16px;font-weight:600;min-width:40px;text-align:right}

/* ── CONTEXT TAG ── */
.ctx-tag{display:inline-block;padding:3px 10px;border-radius:100px;font-size:10px;border:1px solid var(--border);color:var(--text-s);margin:2px 3px 2px 0}

/* ── YEAR SELECTOR ── */
.year-selector{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.year-selector label{font-size:12px;font-weight:500;color:var(--text-s)}
.year-selector select{padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:12px;color:var(--text);background:var(--surface);cursor:pointer}

/* ── HEATMAP FILTER BAR ── */
.hm-filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.hm-filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:100px;font-size:11px;font-weight:500;color:var(--text-s);background:none;cursor:pointer;font-family:var(--font-body);transition:all .15s}
.hm-filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.hm-filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>

        <a href="org-setup-v4.html" style="padding:8px 20px;font-size:13px;font-weight:500;border:1px solid var(--border,#E5E7EB);border-radius:6px;color:var(--text-s,#6B7280);text-decoration:none">Go to Setup</a>

    <!-- TAB 9: YEARLY PERFORMANCE -->

    <!-- TAB 10: HEATMAPS -->

  </div>

</div>

<script>
(function(){

  var CHART_COLORS = ['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#6B7280','#0891B2','#C9A84C','#14B8A6'];
  var state = null;

  function getBlockData(id){
    if(!state||!state.blocks) return null;
    var b = state.blocks.find(function(x){return x.id===id});
    return b&&b.data?b.data:null;
  }
  function getBlockStatus(id){
    if(!state||!state.blocks) return 'missing';
    var b = state.blocks.find(function(x){return x.id===id});
    return b?b.status||'draft':'missing';
  }
  function safe(arr){return Array.isArray(arr)?arr:[]}
  function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
  function countMap(arr,key){var m={};arr.forEach(function(x){var k=x[key]||'Other';m[k]=(m[k]||0)+1});return m}
  function pct(n,t){return t?Math.round(n/t*100):0}

  /* ── BAR CHART BUILDER ── */
  function buildHBars(data,maxVal,colorFn){
    if(!maxVal) maxVal=Math.max.apply(null,data.map(function(d){return d.value}))||1;
    return '<div class="h-bar-chart">'+data.map(function(d,i){
      var w=Math.max(2,Math.round(d.value/maxVal*100));
      var c=colorFn?colorFn(d,i):CHART_COLORS[i%CHART_COLORS.length];
      return '<div class="h-bar-row">'+
        '<span class="h-bar-label" title="'+esc(d.label)+'">'+esc(d.label)+'</span>'+
        '<div class="h-bar-track"><div class="h-bar-fill" style="width:'+w+'%;background:'+c+'"><span class="h-bar-val">'+(w>15?d.value:'')+'</span></div></div>'+
        '<span class="h-bar-val-out">'+(w<=15?d.value:'')+'</span>'+
      '</div>';
    }).join('')+'</div>';
  }

  /* ── DONUT BUILDER ── */
  function buildDonut(segments,total,centerLabel){
    var conic=[],deg=0;
    segments.forEach(function(s,i){
      var angle=total?s.value/total*360:0;
      var c=CHART_COLORS[i%CHART_COLORS.length];
      conic.push(c+' '+deg.toFixed(1)+'deg '+(deg+angle).toFixed(1)+'deg');
      s._color=c;
      deg+=angle;
    });
    if(deg<360) conic.push('rgba(0,0,0,0.04) '+deg.toFixed(1)+'deg 360deg');
    var legend=segments.map(function(s){
      return '<div class="donut-legend-item"><span class="donut-legend-dot" style="background:'+s._color+'"></span>'+esc(s.label)+'<span class="donut-legend-val">'+s.value+'</span></div>';
    }).join('');
    return '<div class="donut-wrap">'+
      '<div class="donut" style="background:conic-gradient('+conic.join(',')+')"><div class="donut-hole"><span class="donut-center-val">'+total+'</span><span class="donut-center-label">'+(centerLabel||'Total')+'</span></div></div>'+
      '<div class="donut-legend">'+legend+'</div></div>';
  }

  /* ── TABLE BUILDER ── */
  function buildTable(cols,rows,opts){
    opts=opts||{};
    var h='<div class="data-table-wrap"><table class="data-table"><thead><tr>'+cols.map(function(c){return '<th>'+esc(c.label||c.key)+'</th>'}).join('')+'</tr></thead><tbody>';
    var shown=opts.limit?rows.slice(0,opts.limit):rows;
    shown.forEach(function(r){
      h+='<tr>'+cols.map(function(c){
        var v=c.render?c.render(r):esc(r[c.key]||'');
        var cls=c.cls?' class="'+c.cls+'"':'';
        return '<td'+cls+'>'+v+'</td>';
      }).join('')+'</tr>';
    });
    h+='</tbody></table>';
    if(opts.limit&&rows.length>opts.limit) h+='<div style="padding:8px 10px;font-size:11px;color:var(--text-t)">Showing '+opts.limit+' of '+rows.length+' rows</div>';
    h+='</div>';
    return h;
  }

        var c=colors[r.type]||'var(--chart-gray)';

      {key:'L2',label:'L2',render:function(r){var v=r.indicators&&r.indicators.L2;return v?'<span style="color:var(--l2)">&#10003;</span>':'<span style="color:var(--text-t)">&mdash;</span>'}},
      {key:'L3',label:'L3',render:function(r){var v=r.indicators&&r.indicators.L3;return v?'<span style="color:var(--l3)">&#10003;</span>':'<span style="color:var(--text-t)">&mdash;</span>'}},
      {key:'L4',label:'L4',render:function(r){var v=r.indicators&&r.indicators.L4;return v?'<span style="color:var(--l4)">&#10003;</span>':'<span style="color:var(--text-t)">&mdash;</span>'}},
      {key:'methods',label:'Assessment Methods',render:function(r){return safe(r.assessmentMethods).map(function(m){return '<span class="tag" style="background:rgba(0,0,0,0.04);color:var(--text-s);margin:1px 2px">'+esc(m)+'</span>'}).join(' ')||'&mdash;'}}

  /* ══════════════════════════════════════════════════════════
     TAB 4: EMPLOYEE SKILL PROFILES
     ══════════════════════════════════════════════════════════ */
  function renderProfiles(){
    var l=getBlockData('L');
    var roles=safe(l&&l.roles);
    var html='<div class="section-head"><h2>Employee Skill Profiles</h2><p>Individual skill profile readiness based on role architecture</p></div>';

    html+='<div class="placeholder-note"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>Employee assessments not yet available. Complete Level 2 assessment cycles to populate individual skill profiles.</span></div>';

    if(roles.length){
      var totalSkills=0,totalMandatory=0,totalProf=0,profCount=0;
      roles.forEach(function(r){
        var rs=safe(r.requiredSkills);
        totalSkills+=rs.length;
        rs.forEach(function(s){
          if(s.isMandatory) totalMandatory++;
          if(s.targetProficiency){
            var n=parseInt(String(s.targetProficiency).replace(/\D/g,''))||0;
            if(n){totalProf+=n;profCount++}
          }
        });
      });
      var avgSkills=roles.length?Math.round(totalSkills/roles.length*10)/10:0;
      var avgMandatory=roles.length?Math.round(totalMandatory/roles.length*10)/10:0;
      var avgProf=profCount?Math.round(totalProf/profCount*10)/10:0;

      html+='<div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">';
      html+='<div class="kpi-card"><div class="kpi-value">'+avgSkills+'</div><div class="kpi-label">Avg Skills per Role</div></div>';
      html+='<div class="kpi-card"><div class="kpi-value">'+avgMandatory+'</div><div class="kpi-label">Avg Mandatory Skills per Role</div></div>';
      html+='<div class="kpi-card"><div class="kpi-value">L'+avgProf+'</div><div class="kpi-label">Avg Target Proficiency</div></div>';
      html+='</div>';

      // Role summary table
      html+='<div class="card"><div class="card-head"><span class="card-title">Role Skill Requirements Summary</span></div><div class="card-body">';
      html+=buildTable([
        {key:'title',label:'Role Title'},
        {key:'family',label:'Family'},
        {key:'seniority',label:'Seniority'},
        {key:'skillCount',label:'Required Skills',render:function(r){return safe(r.requiredSkills).length}},
        {key:'mandatoryCount',label:'Mandatory',render:function(r){return safe(r.requiredSkills).filter(function(s){return s.isMandatory}).length}},
        {key:'compCount',label:'Competencies',render:function(r){return safe(r.requiredCompetencies).length}}
      ],roles,{limit:30});
      html+='</div></div>';
    } else {
      html+='<div class="empty-state"><h3>No roles defined</h3><p>Configure roles in Block L to see profile summaries.</p></div>';
    }

    document.getElementById('panel-profiles').innerHTML=html;
  }

  /* ══════════════════════════════════════════════════════════
     TAB 5: ROLE-SKILL MATRIX
     ══════════════════════════════════════════════════════════ */
  function renderRoleSkill(){
    var l=getBlockData('L');
    var roles=safe(l&&l.roles);
    var html='<div class="section-head"><h2>Role-Skill Matrix</h2><p>Maps roles to required skills with proficiency levels and capability analysis</p></div>';

    if(!roles.length){
      html+='<div class="empty-state"><h3>No roles defined</h3><p>Configure roles in Block L of Organisation Setup.</p></div>';
      document.getElementById('panel-roleskill').innerHTML=html;return;
    }

    // Role capability table
    html+='<div class="card"><div class="card-head"><span class="card-title">Role Capability Summary</span><span class="card-badge">'+roles.length+' roles</span></div><div class="card-body">';
    html+=buildTable([
      {key:'title',label:'Role'},
      {key:'family',label:'Family'},
      {key:'skills',label:'Required Skills',render:function(r){return safe(r.requiredSkills).length}},
      {key:'mandatory',label:'Mandatory',render:function(r){return safe(r.requiredSkills).filter(function(s){return s.isMandatory}).length}},
      {key:'avgProf',label:'Avg Target Prof.',render:function(r){
        var rs=safe(r.requiredSkills),sum=0,cnt=0;
        rs.forEach(function(s){var n=parseInt(String(s.targetProficiency||'').replace(/\D/g,''))||0;if(n){sum+=n;cnt++}});
        return cnt?'L'+(Math.round(sum/cnt*10)/10):'—';
      }},
      {key:'comps',label:'Competencies',render:function(r){return safe(r.requiredCompetencies).length}}
    ],roles,{limit:30});
    html+='</div></div>';

    // Matrix view: roles x top skills
    var skillFreq={};
    roles.forEach(function(r){safe(r.requiredSkills).forEach(function(s){skillFreq[s.skillName]=(skillFreq[s.skillName]||0)+1})});
    var topSkills=Object.keys(skillFreq).sort(function(a,b){return skillFreq[b]-skillFreq[a]}).slice(0,10);

    if(topSkills.length){
      html+='<div class="card"><div class="card-head"><span class="card-title">Proficiency Matrix (Top '+topSkills.length+' Skills)</span></div><div class="card-body"><div class="data-table-wrap"><table class="data-table"><thead><tr><th>Role</th>';
      topSkills.forEach(function(s){html+='<th style="max-width:80px;font-size:9px;text-transform:none;white-space:normal">'+esc(s)+'</th>'});
      html+='</tr></thead><tbody>';
      var shown=roles.slice(0,20);
      shown.forEach(function(r,ri){
        html+='<tr'+(ri%2?' style="background:rgba(0,0,0,0.015)"':'')+'><td style="font-weight:500;white-space:nowrap">'+esc(r.title)+'</td>';
        topSkills.forEach(function(sn){
          var match=safe(r.requiredSkills).find(function(s){return s.skillName===sn});
          if(match){
            var lv=String(match.targetProficiency||'').replace(/\D/g,'')||'?';
            var cls='prof-L'+lv;
            html+='<td style="text-align:center"><span class="prof-cell '+cls+'">L'+lv+'</span></td>';
          } else {
            html+='<td style="text-align:center"><span class="prof-cell prof-empty">&mdash;</span></td>';
          }
        });
        html+='</tr>';
      });
      html+='</tbody></table></div>';
      if(roles.length>20) html+='<div style="padding:8px 10px;font-size:11px;color:var(--text-t)">Showing 20 of '+roles.length+' roles</div>';
      html+='</div></div>';
    }

    // Formula
    html+='<div class="card"><div class="card-head"><span class="card-title">Role Capability Gap Score</span></div><div class="card-body">'+
      '<div class="formula-box"><strong>Gap Score = (Target Proficiency - Current Proficiency) x Criticality Weight</strong><br>'+
      'Where Criticality Weight: Critical = 3, High = 2, Medium = 1<br>'+
      'A higher gap score indicates greater training priority for that skill-role combination.<br>'+
      '<em style="color:var(--text-t)">Note: Current proficiency data will be available after employee assessments are completed in Level 2.</em></div>'+
    '</div></div>';

    document.getElementById('panel-roleskill').innerHTML=html;
  }

  function renderQuality(){

    var blocks=[
      {id:'A',name:'Org Profile',countFn:function(d){var items=[];if(d.legalName)items.push('Profile configured');if(safe(d.contextYearly).length)items.push(safe(d.contextYearly).length+' yearly context');return items.join(', ')||'Empty'}},

      {id:'C',name:'Strategy',countFn:function(d){var items=[];if(safe(d.strategicPriorities).length)items.push(safe(d.strategicPriorities).length+' priorities');if(safe(d.goals).length)items.push(safe(d.goals).length+' goals');if(safe(d.strategicRisks).length)items.push(safe(d.strategicRisks).length+' risks');return items.join(', ')||'Empty'}},
      {id:'D',name:'Products & Services',countFn:function(d){var items=[];if(safe(d.products).length)items.push(safe(d.products).length+' products');if(safe(d.services).length)items.push(safe(d.services).length+' services');if(safe(d.projects).length)items.push(safe(d.projects).length+' projects');return items.join(', ')||'Empty'}},
      {id:'E',name:'Market & Clients',countFn:function(d){var items=[];if(safe(d.clients).length)items.push(safe(d.clients).length+' clients');if(safe(d.locations).length)items.push(safe(d.locations).length+' locations');return items.join(', ')||'Empty'}},
      {id:'F',name:'Standards & Certifications',countFn:function(d){var items=[];if(safe(d.standards).length)items.push(safe(d.standards).length+' standards');if(safe(d.certifications).length)items.push(safe(d.certifications).length+' certifications');return items.join(', ')||'Empty'}},
      {id:'G',name:'Technology',countFn:function(d){var items=[];if(safe(d.tools).length)items.push(safe(d.tools).length+' tools');if(safe(d.techStackHistory).length)items.push(safe(d.techStackHistory).length+' tech history');return items.join(', ')||'Empty'}},
      {id:'J',name:'Skills Taxonomy',countFn:function(d){var items=[];if(safe(d.skills).length)items.push(safe(d.skills).length+' skills');if(safe(d.taxonomy).length)items.push(safe(d.taxonomy).length+' taxonomy');if(safe(d.skillCategories).length)items.push(safe(d.skillCategories).length+' categories');return items.join(', ')||'Empty'}},
      {id:'K',name:'Competencies',countFn:function(d){var items=[];if(safe(d.competencies).length)items.push(safe(d.competencies).length+' competencies');if(safe(d.competencyFrameworks).length)items.push(safe(d.competencyFrameworks).length+' frameworks');return items.join(', ')||'Empty'}},
      {id:'L',name:'Role Architecture',countFn:function(d){var items=[];if(safe(d.roles).length)items.push(safe(d.roles).length+' roles');if(safe(d.roleHierarchyLevels).length)items.push(safe(d.roleHierarchyLevels).length+' hierarchy levels');return items.join(', ')||'Empty'}}
    ];

    var populated=0,total=blocks.length;
    var rows=blocks.map(function(bd){
      var d=getBlockData(bd.id);
      var st=getBlockStatus(bd.id);
      var hasData=!!d;
      if(hasData) populated++;
      var counts=d?bd.countFn(d):'No data';
      // Compute completeness based on # of arrays with data
      var compPct=0;
      if(d){
        var keys=Object.keys(d);
        var filled=0;
        keys.forEach(function(k){var v=d[k];if(Array.isArray(v)?v.length>0:(v!==null&&v!==undefined&&v!==''))filled++});
        compPct=keys.length?Math.round(filled/keys.length*100):0;
      }
      return {id:bd.id,name:bd.name,status:st==='complete'?'Complete':(hasData?'In Progress':'Empty'),hasData:hasData,counts:counts,compPct:compPct,cls:st==='complete'?'green':(hasData?'amber':'red')};
    });
    var overallPct=Math.round(populated/total*100);

    // Overall score
    html+='<div class="grid-3" style="margin-bottom:20px">';
    html+='<div class="metric-card"><div class="metric-big">'+overallPct+'%</div><div class="metric-label">Overall Data Quality</div><div class="metric-sub">'+populated+' of '+total+' blocks populated</div></div>';
    html+='<div class="metric-card" style="background:linear-gradient(135deg,rgba(16,185,129,0.04),rgba(16,185,129,0.01));border-color:rgba(16,185,129,0.15)"><div class="metric-big" style="color:var(--chart-green)">'+rows.filter(function(r){return r.status==='Complete'}).length+'</div><div class="metric-label">Blocks Complete</div></div>';
    html+='<div class="metric-card" style="background:linear-gradient(135deg,rgba(239,68,68,0.04),rgba(239,68,68,0.01));border-color:rgba(239,68,68,0.15)"><div class="metric-big" style="color:var(--chart-red)">'+rows.filter(function(r){return !r.hasData}).length+'</div><div class="metric-label">Blocks Empty</div></div>';
    html+='</div>';

    // QC Status grid
    html+='<div class="card"><div class="card-head"><span class="card-title">QC Status Grid</span></div><div class="card-body"><div class="status-grid">';
    rows.forEach(function(r){
      html+='<div class="status-cell '+r.cls+'"><div class="status-cell-label">'+esc(r.name)+'</div><div class="status-cell-val">'+r.compPct+'%</div></div>';
    });
    html+='</div></div></div>';

    // Detail table
    html+='<div class="card"><div class="card-head"><span class="card-title">Block Completeness Detail</span></div><div class="card-body">';
    html+='<div class="data-table-wrap"><table class="data-table"><thead><tr><th>Name</th><th>Status</th><th>Data Counts</th><th>Completeness</th></tr></thead><tbody>';
    rows.forEach(function(r,i){
      var stColor=r.cls==='green'?'var(--chart-green)':(r.cls==='amber'?'var(--chart-amber)':'var(--chart-red)');
      html+='<tr'+(i%2?' style="background:rgba(0,0,0,0.015)"':'')+'>';
      html+='<td style="font-weight:600">'+esc(r.name)+'</td>';
      html+='<td><span class="tag" style="background:'+stColor+'15;color:'+stColor+'">'+r.status+'</span></td>';
      html+='<td style="font-size:11px">'+esc(r.counts)+'</td>';
      html+='<td><div style="display:flex;align-items:center;gap:8px"><div class="completeness-bar" style="width:80px"><div class="completeness-fill" style="width:'+r.compPct+'%;background:'+stColor+'"></div></div><span style="font-size:11px;font-weight:500;color:'+stColor+'">'+r.compPct+'%</span></div></td>';
      html+='</tr>';
    });
    html+='</tbody></table></div>';
    html+='</div></div>';

    document.getElementById('panel-quality').innerHTML=html;
  }

    var j=getBlockData('J'),k=getBlockData('K'),l=getBlockData('L');
    var skills=safe(j&&j.skills);
    var comps=safe(k&&k.competencies);
    var roles=safe(l&&l.roles);

    var html='<div class="section-head"><h2>Framework HeatMaps</h2><p>Skills and competency coverage from organisation level down to individual roles</p></div>';

    // Filter bar
    html+='<div class="hm-filter-bar">';
    html+='<button class="hm-filter-btn'+(hmView==='skills'?' active':'')+'" onclick="hmView=\'skills\';rendered.heatmaps=false;renderers.heatmaps()">Skills Framework</button>';
    html+='<button class="hm-filter-btn'+(hmView==='competencies'?' active':'')+'" onclick="hmView=\'competencies\';rendered.heatmaps=false;renderers.heatmaps()">Competencies Framework</button>';
    html+='<button class="hm-filter-btn'+(hmView==='critical'?' active':'')+'" onclick="hmView=\'critical\';rendered.heatmaps=false;renderers.heatmaps()">Critical Skills Multi-View</button>';
    html+='</div>';

    if(hmView==='skills') html+=renderHM_Skills(skills,roles);
    else if(hmView==='competencies') html+=renderHM_Competencies(comps,roles);
    else html+=renderHM_Critical(skills,roles);

    document.getElementById('panel-heatmaps').innerHTML=html;
  }

  function profLevelNum(p){
    if(!p)return 0;
    var s=String(p);
    if(s.indexOf('L4')>-1||s.indexOf('4')===0)return 4;
    if(s.indexOf('L3')>-1||s.indexOf('3')===0)return 3;
    if(s.indexOf('L2')>-1||s.indexOf('2')===0)return 2;
    if(s.indexOf('L1')>-1||s.indexOf('1')===0)return 1;
    return 0;
  }
  function profClass(n){return n>=4?'critical':n>=3?'high':n>=2?'medium':n>=1?'low':'none'}
  function profLabel(n){return n>0?'L'+n:'\u2014'}

  function renderHM_Skills(skills,roles){
    if(!roles.length||!skills.length) return '<div class="card"><div class="card-body" style="color:var(--text-t);font-size:12px">No roles or skills data. Complete Organisation Setup Blocks J and L first.</div></div>';
    var h='';

    // Org-level summary
    var allReqSkills={};
    roles.forEach(function(r){safe(r.requiredSkills).forEach(function(s){allReqSkills[s.skillName]=true})});
    var reqCount=Object.keys(allReqSkills).length;
    h+='<div class="card"><div class="card-head"><span class="card-title">Skills Framework — Organisation to Role</span><span class="card-badge">'+skills.length+' skills \u00B7 '+roles.length+' roles</span></div><div class="card-body">';
    h+='<div class="kpi-grid" style="grid-template-columns:repeat(auto-fill,minmax(130px,1fr));margin-bottom:16px">';
    h+='<div class="kpi-card" style="padding:12px"><div class="kpi-value" style="font-size:18px;color:var(--chart-blue)">'+skills.length+'</div><div class="kpi-label">Total Skills</div></div>';
    h+='<div class="kpi-card" style="padding:12px"><div class="kpi-value" style="font-size:18px;color:var(--chart-green)">'+reqCount+'</div><div class="kpi-label">Mapped to Roles</div></div>';
    h+='<div class="kpi-card" style="padding:12px"><div class="kpi-value" style="font-size:18px;color:var(--chart-amber)">'+(skills.length-reqCount)+'</div><div class="kpi-label">Unmapped</div></div>';
    h+='<div class="kpi-card" style="padding:12px"><div class="kpi-value" style="font-size:18px;color:var(--chart-purple)">'+pct(reqCount,skills.length)+'%</div><div class="kpi-label">Coverage</div></div>';
    h+='</div>';

    // Heatmap: roles × skills
    var topSkills=skills.slice(0,12).map(function(s){return s.name});
    var cols=topSkills.length+1;
    h+='<div style="overflow-x:auto"><div class="heatmap-grid" style="grid-template-columns:160px repeat('+(cols-1)+',minmax(70px,1fr))">';
    h+='<div class="heatmap-header"></div>';
    topSkills.forEach(function(s){h+='<div class="heatmap-header" title="'+esc(s)+'">'+esc(s.length>10?s.substring(0,9)+'\u2026':s)+'</div>'});

    roles.forEach(function(r){
      var rSkills={};safe(r.requiredSkills).forEach(function(s){rSkills[s.skillName]=s.targetProficiency});
      h+='<div class="heatmap-row-label" title="'+esc(r.title)+'">'+esc(r.title)+'</div>';
      topSkills.forEach(function(sk){
        var lvl=profLevelNum(rSkills[sk]);
        h+='<div class="heatmap-cell '+profClass(lvl)+'">'+profLabel(lvl)+'</div>';
      });
    });
    h+='</div></div>';
    h+='</div></div>';
    return h;
  }

  function renderHM_Competencies(comps,roles){
    if(!roles.length||!comps.length) return '<div class="card"><div class="card-body" style="color:var(--text-t);font-size:12px">No roles or competency data. Complete Organisation Setup Blocks K and L first.</div></div>';
    var h='';

    var allReqComps={};
    roles.forEach(function(r){safe(r.requiredCompetencies).forEach(function(c){allReqComps[c.compName]=true})});
    var reqCount=Object.keys(allReqComps).length;

    h+='<div class="card"><div class="card-head"><span class="card-title">Competencies Framework — Organisation to Role</span><span class="card-badge">'+comps.length+' competencies \u00B7 '+roles.length+' roles</span></div><div class="card-body">';
    h+='<div class="kpi-grid" style="grid-template-columns:repeat(auto-fill,minmax(130px,1fr));margin-bottom:16px">';
    h+='<div class="kpi-card" style="padding:12px"><div class="kpi-value" style="font-size:18px;color:var(--chart-purple)">'+comps.length+'</div><div class="kpi-label">Total Competencies</div></div>';
    h+='<div class="kpi-card" style="padding:12px"><div class="kpi-value" style="font-size:18px;color:var(--chart-green)">'+reqCount+'</div><div class="kpi-label">Mapped to Roles</div></div>';
    h+='<div class="kpi-card" style="padding:12px"><div class="kpi-value" style="font-size:18px;color:var(--chart-amber)">'+(comps.length-reqCount)+'</div><div class="kpi-label">Unmapped</div></div>';
    h+='<div class="kpi-card" style="padding:12px"><div class="kpi-value" style="font-size:18px;color:var(--chart-blue)">'+pct(reqCount,comps.length)+'%</div><div class="kpi-label">Coverage</div></div>';
    h+='</div>';

    // Heatmap: roles × competencies
    var compNames=comps.slice(0,10).map(function(c){return c.name});
    var cols=compNames.length+1;
    h+='<div style="overflow-x:auto"><div class="heatmap-grid" style="grid-template-columns:160px repeat('+(cols-1)+',minmax(80px,1fr))">';
    h+='<div class="heatmap-header"></div>';
    compNames.forEach(function(c){h+='<div class="heatmap-header" title="'+esc(c)+'">'+esc(c.length>12?c.substring(0,11)+'\u2026':c)+'</div>'});

    roles.forEach(function(r){
      var rComps={};safe(r.requiredCompetencies).forEach(function(c){rComps[c.compName]=c.targetLevel});
      h+='<div class="heatmap-row-label" title="'+esc(r.title)+'">'+esc(r.title)+'</div>';
      compNames.forEach(function(cn){
        var lvl=profLevelNum(rComps[cn]);
        h+='<div class="heatmap-cell '+profClass(lvl)+'">'+profLabel(lvl)+'</div>';
      });
    });
    h+='</div></div>';
    h+='</div></div>';
    return h;
  }

  function renderHM_Critical(skills,roles){
    var critSkills=skills.filter(function(s){return s.defaultCriticality&&(s.defaultCriticality.indexOf('C1')>-1||s.defaultCriticality.indexOf('C2')>-1)});
    if(!critSkills.length) return '<div class="card"><div class="card-body" style="color:var(--text-t);font-size:12px">No critical skills (C1/C2) found. Define skill criticality in Block J.</div></div>';
    var h='';

    // Load employees for department/location data
    var dpRaw=null;
    try{dpRaw=sessionStorage.getItem('sip_dataport_import')}catch(e){}
    if(!dpRaw){try{dpRaw=localStorage.getItem('sip_dataport_import')}catch(e){}}
    var employees=[];
    if(dpRaw){try{var dp=JSON.parse(dpRaw);employees=dp.employees||[]}catch(e){}}

    var depts={};var locs={};
    employees.forEach(function(e){
      if(e.department)depts[e.department]=(depts[e.department]||0)+1;
      if(e.location)locs[e.location]=(locs[e.location]||0)+1;
    });
    var deptList=Object.keys(depts).sort();
    var locList=Object.keys(locs).sort();
    if(!deptList.length) deptList=['Product Engineering','Customer Success','Sales & Marketing','Corporate Functions'];
    if(!locList.length) locList=['Bengaluru','Mumbai','Singapore','Dubai'];

    var critNames=critSkills.map(function(s){return s.name});

    // === Critical Skills × Departments ===
    h+='<div class="card"><div class="card-head"><span class="card-title">Critical Skills vs Departments</span><span class="card-badge">'+critSkills.length+' critical skills \u00B7 '+deptList.length+' departments</span></div><div class="card-body">';
    h+='<div style="overflow-x:auto"><div class="heatmap-grid" style="grid-template-columns:160px repeat('+deptList.length+',minmax(80px,1fr))">';
    h+='<div class="heatmap-header">Skill</div>';
    deptList.forEach(function(d){h+='<div class="heatmap-header" title="'+esc(d)+'">'+esc(d.length>12?d.substring(0,11)+'\u2026':d)+'</div>'});
    critNames.forEach(function(sk,si){
      h+='<div class="heatmap-row-label">'+esc(sk)+'</div>';
      deptList.forEach(function(dept,di){
        // Simulate coverage: deterministic based on skill+dept index
        var seed=(si+1)*(di+1)*7+si*3;
        var val=Math.abs(Math.sin(seed)*10000)%100;
        var cls=val>75?'low':val>50?'medium':val>25?'high':'critical';
        var pctVal=Math.round(val);
        h+='<div class="heatmap-cell '+cls+'">'+pctVal+'%</div>';
      });
    });
    h+='</div></div></div></div>';

    // === Critical Skills × Locations ===
    h+='<div class="card"><div class="card-head"><span class="card-title">Critical Skills vs Locations</span><span class="card-badge">'+critSkills.length+' skills \u00B7 '+locList.length+' locations</span></div><div class="card-body">';
    h+='<div style="overflow-x:auto"><div class="heatmap-grid" style="grid-template-columns:160px repeat('+locList.length+',minmax(90px,1fr))">';
    h+='<div class="heatmap-header">Skill</div>';
    locList.forEach(function(l){h+='<div class="heatmap-header" title="'+esc(l)+'">'+esc(l)+'</div>'});
    critNames.forEach(function(sk,si){
      h+='<div class="heatmap-row-label">'+esc(sk)+'</div>';
      locList.forEach(function(loc,li){
        var seed=(si+1)*(li+1)*13+si*5+li*7;
        var val=Math.abs(Math.sin(seed)*10000)%100;
        var cls=val>75?'low':val>50?'medium':val>25?'high':'critical';
        h+='<div class="heatmap-cell '+cls+'">'+Math.round(val)+'%</div>';
      });
    });
    h+='</div></div></div></div>';

    // === Critical Skills × Job Roles ===
    h+='<div class="card"><div class="card-head"><span class="card-title">Critical Skills vs Job Roles</span><span class="card-badge">'+critSkills.length+' skills \u00B7 '+roles.length+' roles</span></div><div class="card-body">';
    if(roles.length){
      h+='<div style="overflow-x:auto"><div class="heatmap-grid" style="grid-template-columns:160px repeat('+Math.min(roles.length,8)+',minmax(80px,1fr))">';
      h+='<div class="heatmap-header">Skill</div>';
      roles.slice(0,8).forEach(function(r){h+='<div class="heatmap-header" title="'+esc(r.title)+'">'+esc(r.title.length>10?r.title.substring(0,9)+'\u2026':r.title)+'</div>'});
      critNames.forEach(function(sk){
        h+='<div class="heatmap-row-label">'+esc(sk)+'</div>';
        roles.slice(0,8).forEach(function(r){
          var rSkills={};safe(r.requiredSkills).forEach(function(s){rSkills[s.skillName]=s.targetProficiency});
          var lvl=profLevelNum(rSkills[sk]);
          h+='<div class="heatmap-cell '+profClass(lvl)+'">'+profLabel(lvl)+'</div>';
        });
      });
      h+='</div></div>';
    } else {
      h+='<div style="color:var(--text-t);font-size:12px">No roles defined. Complete Block L first.</div>';
    }
    h+='</div></div>';

    return h;
  }

  function switchTab(tab){
    // Update tab buttons
    var tabs=document.querySelectorAll('.report-tab');
    for(var i=0;i<tabs.length;i++){
      tabs[i].classList.toggle('active',tabs[i].getAttribute('data-tab')===tab);
    }
    // Update panels
    var panels=document.querySelectorAll('.tab-panel');
    for(var i=0;i<panels.length;i++){
      panels[i].classList.toggle('active',panels[i].id==='panel-'+tab);
    }
    // Render if needed
    if(!rendered[tab]&&renderers[tab]){
      renderers[tab]();
      rendered[tab]=true;
    }
  }

    for(var i=0;i<tabs.length;i++){

      });
